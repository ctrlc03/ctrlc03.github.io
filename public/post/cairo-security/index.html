03e    ]\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e}\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003eTo sum up:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003es3 - create and manage buckets + object permissions\u003c/li\u003e\n\u003cli\u003eec2 - start, stop, terminate and describe instances\u003c/li\u003e\n\u003cli\u003essm - run a command and retrieve the output\u003c/li\u003e\n\u003cli\u003eiam - pass down a role (the IAM user will need to attach a instance policy to the ec2 instance)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eOn the other hand, the EC2 instances will require the following instance policy:\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-json\" data-lang=\"json\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e{\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#f92672\"\u003e\u0026#34;Version\u0026#34;\u003c/span\u003e: \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;2012-10-17\u0026#34;\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#f92672\"\u003e\u0026#34;Statement\u0026#34;\u003c/span\u003e: [\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        {\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e            \u003cspan style=\"color:#f92672\"\u003e\u0026#34;Sid\u0026#34;\u003c/span\u003e: \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;EC2InstanceRole\u0026#34;\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e            \u003cspan style=\"color:#f92672\"\u003e\u0026#34;Effect\u0026#34;\u003c/span\u003e: \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;Allow\u0026#34;\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e            \u003cspan style=\"color:#f92672\"\u003e\u0026#34;Action\u0026#34;\u003c/span\u003e: [\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e                \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;s3:ListBucket\u0026#34;\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e                \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;s3:PutObject\u0026#34;\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e                \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;s3:GetObject\u0026#34;\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e                \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;s3:PutObjectAcl\u0026#34;\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e                \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;ssm:UpdateInstanceInformation\u0026#34;\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e                \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;ssmmessages:CreateControlChannel\u0026#34;\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e                \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;ssmmessages:CreateDataChannel\u0026#34;\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e                \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;ssmmessages:OpenControlChannel\u0026#34;\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e                \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;ssmmessages:OpenDataChannel\u0026#34;\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e            ],\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e            \u003cspan style=\"color:#f92672\"\u003e\u0026#34;Resource\u0026#34;\u003c/span\u003e: \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;*\u0026#34;\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        }\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    ]\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e}\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003eIn a nutshell:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003es3 - list the objects in the bucket, download them and upload new ones with custom ACL\u003c/li\u003e\n\u003cli\u003essm - allow commands to be run and output to be posted\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3 id=\"is-this-secure\"\u003eIs this secure?\u003c/h3\u003e\n\u003cp\u003eThanks to IAM roles and policies, we can safely execute commands on a VM using SSM, and only the IAM user used by the cloud functions can run commands and retrieve output. We initially thought or running an API in the VM, however this would have needed to be secured using some sort of authentication (perhaps JWT); with SSM we do not have to worry about that.\u003c/p\u003e\n\u003ch3 id=\"is-this-more-expensive\"\u003eIs this more expensive?\u003c/h3\u003e\n\u003cp\u003eWe have not run benchmarks yet, however the costs of running VMs can be quite cheap, considering that AWS charges for usage of a VM with increments of 60 seconds. Thus if the VM is running for 5 minutes to verify the contribution, we only end up paying 5 minutes of computing power (a 72gb VM can cost up to 3$ per hour depending on the number of VCPUs).\u003c/p\u003e\n\u003cp\u003eThe only other new cost is storage, as each VM requires a separate hard drive to store the ceremony files such as powers of tau and genesis zKey. AWS free tier comes with 30gb a month of elastic block service (EBS), so for smaller ceremonies a user might not incur into any fees.\u003c/p\u003e\n","cat":"POST","date":"2023.06.01","read":"15 MIN","slug":"devlog_02","summary":"QF Research \u0026 scaling p0tion","title":"Devlog 00002"},{"body":"\u003ch1 id=\"devlog-2305---0606\"\u003eDevlog 23/05 - 06/06\u003c/h1\u003e\n\u003cp\u003eHow the MACI v1 ceremony \u003ca href=\"https://mpc-tool-ctrlc03.web.app/\"\u003ewebsite\u003c/a\u003e was built. Link to the \u003ca href=\"https://github.com/privacy-scaling-explorations/maci-phase2-setup\"\u003erepo\u003c/a\u003e.\u003c/p\u003e\n\u003ch2 id=\"how-to-frontend\"\u003eHow to frontend\u003c/h2\u003e\n\u003cp\u003eIn three simple steps:\u003c/p\u003e\n\u003cp\u003eStep 1. Get a good designer, it\u0026rsquo;s incredible how a good design makes everything easier for a dev.\u003cbr\u003e\nStep 2. Figma has many plugins which can be used to port the design to some sort of React code/CSS. We decided to use \u003ca href=\"https://figma.chakra-ui.com/\"\u003eFigPilot\u003c/a\u003e which generates a somewhat working React code using Chakra UI.\u003cbr\u003e\nStep 3. Modify the code to be more responsive (the output from FigPilot uses fixed measures such as pixels rather than percentages) and add colors and images.\u003c/p\u003e\n\u003ch2 id=\"highlights\"\u003eHighlights\u003c/h2\u003e\n\u003ch3 id=\"vercel--firestore--friends\"\u003eVercel \u0026lt;\u0026gt; Firestore != friends\u003c/h3\u003e\n\u003cp\u003eFor some reason, we could not get the app deployed on Vercel to talk to Firestore. Stack overflow did not help, so we ended up deploying it using Firebase hosting.\u003c/p\u003e\n\u003cp\u003eThis works out pretty well and it\u0026rsquo;s super easy:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003enpm install -g firebase-tools\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003enpx firebase init\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003enpx firebase deploy --only hosting\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eNow, every time we want to deploy we can just use \u003ccode\u003enpx firebase deploy --only hosting\u003c/code\u003e and the app will update in no time.\u003c/p\u003e\n\u003cp\u003eFor the CI, we can use the following workflow to automatically deploy on new commits to dev and main:\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-yml\" data-lang=\"yml\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#f92672\"\u003ename\u003c/span\u003e: \u003cspan style=\"color:#ae81ff\"\u003eDeploy to Firebase - deploy prod on push\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#f92672\"\u003eon\u003c/span\u003e:\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e  \u003cspan style=\"color:#f92672\"\u003epush\u003c/span\u003e:\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#f92672\"\u003ebranches\u003c/span\u003e: [\u003cspan style=\"color:#ae81ff\"\u003emain, dev]\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#f92672\"\u003ejobs\u003c/span\u003e:\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e  \u003cspan style=\"color:#f92672\"\u003ebuild_and_deploy_prod\u003c/span\u003e:\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#f92672\"\u003eruns-on\u003c/span\u003e: \u003cspan style=\"color:#ae81ff\"\u003eubuntu-latest\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#f92672\"\u003esteps\u003c/span\u003e:\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e      - \u003cspan style=\"color:#f92672\"\u003euses\u003c/span\u003e: \u003cspan style=\"color:#ae81ff\"\u003eactions/checkout@v3\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e      - \u003cspan style=\"color:#f92672\"\u003ename\u003c/span\u003e: \u003cspan style=\"color:#ae81ff\"\u003eInstall deps and deploy\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#f92672\"\u003erun\u003c/span\u003e: |\u003cspan style=\"color:#e6db74\"\u003e\n\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#e6db74\"\u003e          echo \u0026#34;${{ secrets.ENV_FILE }}\u0026#34; \u0026gt; ./.env\n\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#e6db74\"\u003e          yarn install\n\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#e6db74\"\u003e          yarn build\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e      - \u003cspan style=\"color:#f92672\"\u003ename\u003c/span\u003e: \u003cspan style=\"color:#ae81ff\"\u003eWrite serviceAccountKey in a JSON file\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#f92672\"\u003euses\u003c/span\u003e: \u003cspan style=\"color:#ae81ff\"\u003ejsdaniell/create-json@v1.2.1\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#f92672\"\u003ewith\u003c/span\u003e:\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e          \u003cspan style=\"color:#f92672\"\u003ename\u003c/span\u003e: \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;serviceAccountKey.json\u0026#34;\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e          \u003cspan style=\"color:#f92672\"\u003ejson\u003c/span\u003e: \u003cspan style=\"color:#ae81ff\"\u003e${{ secrets.FIREBASE_SERVICE_ACCOUNT }}\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e      - \u003cspan style=\"color:#f92672\"\u003ename\u003c/span\u003e: \u003cspan style=\"color:#ae81ff\"\u003eDeploy\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#f92672\"\u003erun\u003c/span\u003e: \u003cspan style=\"color:#ae81ff\"\u003eyarn deploy\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#f92672\"\u003eenv\u003c/span\u003e:\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e          \u003cspan style=\"color:#f92672\"\u003eGOOGLE_APPLICATION_CREDENTIALS\u003c/span\u003e: \u003cspan style=\"color:#ae81ff\"\u003e./serviceAccountKey.json\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003eTo sum it up:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003esave the secrets in a .env file\u003c/li\u003e\n\u003cli\u003einstall dependencies and build the project\u003c/li\u003e\n\u003cli\u003esave the service account key needed to deploy to Firebase\u003c/li\u003e\n\u003cli\u003edeploy using a yarn script (firebase deploy \u0026ndash;only hosting)\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch3 id=\"no-need-for-a-table-pagination-library\"\u003eNo need for a table pagination library\u003c/h3\u003e\n\u003cp\u003eIn order to display the verification transcripts for the ceremony, which hopefully will be in the thousands, they were organized as a table. Of course, one cannot show all of them at once so I had to come up with a solution to display x transcripts at one time, and filter them by circuit and allow to search. How do we do this all in one?\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-ts\" data-lang=\"ts\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003etranscripts\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    .\u003cspan style=\"color:#a6e22e\"\u003efilter\u003c/span\u003e(\u003cspan style=\"color:#a6e22e\"\u003echeckByCircuit\u003c/span\u003e)\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    .\u003cspan style=\"color:#a6e22e\"\u003efilter\u003c/span\u003e(\u003cspan style=\"color:#a6e22e\"\u003echeckSearch\u003c/span\u003e)\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    .\u003cspan style=\"color:#a6e22e\"\u003eslice\u003c/span\u003e(\u003cspan style=\"color:#a6e22e\"\u003estartIndex\u003c/span\u003e, \u003cspan style=\"color:#a6e22e\"\u003eendIndex\u003c/span\u003e)\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    .\u003cspan style=\"color:#a6e22e\"\u003emap\u003c/span\u003e((\u003cspan style=\"color:#a6e22e\"\u003etranscript\u003c/span\u003e: \u003cspan style=\"color:#66d9ef\"\u003eITranscript\u003c/span\u003e, \u003cspan style=\"color:#a6e22e\"\u003eindex\u003c/span\u003e: \u003cspan style=\"color:#66d9ef\"\u003enumber\u003c/span\u003e) \u003cspan style=\"color:#f92672\"\u003e=\u0026gt;\u003c/span\u003e {})\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003e\u003ccode\u003etranscripts\u003c/code\u003e is an array of our Transcript object (basically it contains the transcript content, the circuit name, the zkey index and participant id), and we want to:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003efilter by circuit name -\u0026gt; \u003ccode\u003e.filter(checkByCircuit)\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-ts\" data-lang=\"ts\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#66d9ef\"\u003econst\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003echeckByCircuit\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e (\u003cspan style=\"color:#a6e22e\"\u003etranscript\u003c/span\u003e: \u003cspan style=\"color:#66d9ef\"\u003eITranscript\u003c/span\u003e)\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#66d9ef\"\u003eboolean\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e=\u0026gt;\u003c/span\u003e {\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#66d9ef\"\u003eif\u003c/span\u003e (\u003cspan style=\"color:#a6e22e\"\u003eselectedCircuit\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e===\u003c/span\u003e \u003cspan style=\"color:#e6db74\"\u003e\u0026#39;\u0026#39;\u003c/span\u003e) \u003cspan style=\"color:#66d9ef\"\u003ereturn\u003c/span\u003e \u003cspan style=\"color:#66d9ef\"\u003etrue\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#66d9ef\"\u003ereturn\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003etranscript\u003c/span\u003e.\u003cspan style=\"color:#a6e22e\"\u003ecircuitName\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e===\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eselectedCircuit\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e}\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cul\u003e\n\u003cli\u003efilter by search term -\u0026gt; \u003ccode\u003e.filter(checkSearch)\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-ts\" data-lang=\"ts\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#66d9ef\"\u003econst\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003echeckSearch\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e (\u003cspan style=\"color:#a6e22e\"\u003etranscript\u003c/span\u003e: \u003cspan style=\"color:#66d9ef\"\u003eITranscript\u003c/span\u003e)\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#66d9ef\"\u003eboolean\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e=\u0026gt;\u003c/span\u003e {\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#66d9ef\"\u003eif\u003c/span\u003e (\u003cspan style=\"color:#a6e22e\"\u003esearchTerm\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e===\u003c/span\u003e \u003cspan style=\"color:#e6db74\"\u003e\u0026#39;\u0026#39;\u003c/span\u003e) \u003cspan style=\"color:#66d9ef\"\u003ereturn\u003c/span\u003e \u003cspan style=\"color:#66d9ef\"\u003etrue\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#75715e\"\u003e// if it\u0026#39;s alphanumerical it\u0026#39;s the zkey index\n\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#66d9ef\"\u003eif\u003c/span\u003e (\u003cspan style=\"color:#a6e22e\"\u003esearchTerm\u003c/span\u003e.\u003cspan style=\"color:#a6e22e\"\u003ematch\u003c/span\u003e(\u003cspan style=\"color:#e6db74\"\u003e/^[0-9]+$/\u003c/span\u003e)) {\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#66d9ef\"\u003ereturn\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003etranscript\u003c/span\u003e.\u003cspan style=\"color:#a6e22e\"\u003ezKeyIndex\u003c/span\u003e.\u003cspan style=\"color:#a6e22e\"\u003eincludes\u003c/span\u003e(\u003cspan style=\"color:#a6e22e\"\u003esearchTerm\u003c/span\u003e)\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    }\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#75715e\"\u003e// otherwise is the participant index\n\u003c/span\u003e\u003c/span\u003e\u003 span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003esetEndIndex\u003c/span\u003e(\u003cspan style=\"color:#a6e22e\"\u003eitemsPerPage\u003c/span\u003e)\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    } \u003cspan style=\"color:#66d9ef\"\u003eelse\u003c/span\u003e {\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003esetEndIndex\u003c/span\u003e(\u003cspan style=\"color:#a6e22e\"\u003eindex\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e*\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eitemsPerPage\u003c/span\u003e)\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003esetStartIndex\u003c/span\u003e(\u003cspan style=\"color:#a6e22e\"\u003eindex\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e*\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eitemsPerPage\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e-\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eitemsPerPage\u003c/span\u003e)\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    }\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e}\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003eWhen the user clicks on the table to navigate to the next page, the new page index will be passed to the \u003ccode\u003epaginate\u003c/code\u003e function and set the start index and end index so that the array of transcripts can be sliced accordingly.\u003c/p\u003e\n","cat":"POST","date":"2023.06.01","read":"3 MIN","slug":"devlog_01","summary":"How to frontend","title":"Devlog 00001"},{"body":"\u003ch1 id=\"circom-101\"\u003eCircom 101\u003c/h1\u003e\n\u003cblockquote\u003e\n\u003cp\u003eIn progress\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eTrying to learn Circom by going through the basic circuits (that come with \u003ca href=\"https://github.com/iden3/circomlib\"\u003ecircomlib\u003c/a\u003e).\u003c/p\u003e\n\u003ch2 id=\"concepts\"\u003eConcepts\u003c/h2\u003e\n\u003ch3 id=\"signals\"\u003eSignals\u003c/h3\u003e\n\u003cp\u003eSignals in Circom are immutable (thus the opposite of a variable), and their content is unknown at compile time even if a constant is assigned to it. All input signals are private by default, and public signals can only be distinguished when defining the main component.\u003c/p\u003e\n\u003cp\u003eLet\u0026rsquo;s take as an example the following simple circuit:\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-js\" data-lang=\"js\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003epragma\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ecircom\u003c/span\u003e \u003cspan style=\"color:#ae81ff\"\u003e2.0\u003c/span\u003e.\u003cspan style=\"color:#a6e22e\"\u003ex\u003c/span\u003e;\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003etemplate\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eMain\u003c/span\u003e() {\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e  \u003cspan style=\"color:#a6e22e\"\u003esignal\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003einput\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ex1\u003c/span\u003e;\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e  \u003cspan style=\"color:#a6e22e\"\u003esignal\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003einput\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ex2\u003c/span\u003e;\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e  \u003cspan style=\"color:#a6e22e\"\u003esignal\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003einput\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ex3\u003c/span\u003e;\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e  \u003cspan style=\"color:#a6e22e\"\u003esignal\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003einput\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ex4\u003c/span\u003e;\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e  \u003cspan style=\"color:#a6e22e\"\u003esignal\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ey1\u003c/span\u003e;\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e  \u003cspan style=\"color:#a6e22e\"\u003esignal\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ey2\u003c/span\u003e;\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e  \u003cspan style=\"color:#a6e22e\"\u003esignal\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eoutput\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eout\u003c/span\u003e;\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e  \u003cspan style=\"color:#a6e22e\"\u003ey1\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e\u0026lt;--\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ex1\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e+\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ex2\u003c/span\u003e;\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e  \u003cspan style=\"color:#a6e22e\"\u003ey2\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e\u0026lt;--\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ey1\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e/\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ex3\u003c/span\u003e;\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e  \u003cspan style=\"color:#a6e22e\"\u003eout\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e\u0026lt;--\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ey2\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e-\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ex4\u003c/span\u003e;\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e  \u003cspan style=\"color:#a6e22e\"\u003ey1\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e===\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ex1\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e+\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ex2\u003c/span\u003e;\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e  \u003cspan style=\"color:#a6e22e\"\u003ey1\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e===\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ey2\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e*\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ex3\u003c/span\u003e;\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e  \u003cspan style=\"color:#a6e22e\"\u003eout\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e===\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ey2\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e-\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ex4\u003c/span\u003e;\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e}\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003ecomponent\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003emain\u003c/span\u003e { \u003cspan style=\"color:#66d9ef\"\u003epublic\u003c/span\u003e [ \u003cspan style=\"color:#a6e22e\"\u003ex2\u003c/span\u003e ] } \u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eMain\u003c/span\u003e();\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003eWe can see that we declare \u003ccode\u003ex2\u003c/code\u003e as a public input signal at very end of the circuit, when declaring the \u003ccode\u003emain\u003c/code\u003e component.\u003c/p\u003e\n\u003cp\u003eOutput signals on the other end, are always public and cannot be made private.\u003c/p\u003e\n\u003cp\u003eSyntax: \u003ccode\u003esignal x;\u003c/code\u003e\u003c/p\u003e\n\u003cp\u003eCan use the keywords \u003ccode\u003einput\u003c/code\u003e, and \u003ccode\u003eoutput\u003c/code\u003e. When neither of these keywords are used, the signal is considered an intermediate circuit.\u003c/p\u003e\n\u003ch3 id=\"variables\"\u003eVariables\u003c/h3\u003e\n\u003cp\u003eVariables are used to assist in computations where no constraint is needed.\u003c/p\u003e\n\u003cp\u003eSyntax: \u003ccode\u003evar x;\u003c/code\u003e\u003c/p\u003e\n\u003ch3 id=\"assignments-and-constraints\"\u003eAssignments and constraints\u003c/h3\u003e\n\u003cp\u003eThere are different ways of assigning signals (the direction n style=\"color:#f92672\"\u003e==\u0026gt;\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003emux\u003c/span\u003e.\u003cspan style=\"color:#a6e22e\"\u003es\u003c/span\u003e;\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003emux\u003c/span\u003e.\u003cspan style=\"color:#a6e22e\"\u003eout\u003c/span\u003e[\u003cspan style=\"color:#ae81ff\"\u003e0\u003c/span\u003e] \u003cspan style=\"color:#f92672\"\u003e==\u0026gt;\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eout\u003c/span\u003e;\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e}\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e","cat":"POST","date":"2023.04.28","read":"3 MIN","slug":"learning-circom","summary":"Learning Circom together","title":"Learning Circom"},{"body":"\u003c!-- raw HTML omitted --\u003e\n\u003c!-- raw HTML omitted --\u003e\n\u003ch1 id=\"cairo-and-starknet-security\"\u003eCairo and StarkNet Security\u003c/h1\u003e\n\u003ch2 id=\"introduction\"\u003eIntroduction\u003c/h2\u003e\n\u003cp\u003e\u003ca href=\"https://starkware.co/starknet/\"\u003eStarkNet\u003c/a\u003e is a decentralized ZK rollup which operates as a Layer 2 (L2) for Ethereum.\nSmart contracts are developed using the Cairo programming language, a general purpose Turing-complete language.\u003c/p\u003e\n\u003cp\u003eWhile Cairo is still relatively new, it is progressing at a very quick pace and being widely adopted by many developers. With it being this new, security is still a big variable, and research on this field is still in its infancy. Therefore, this \u0026ldquo;guide\u0026rdquo; aims to provide some points to consider when writing smart contracts with Cairo.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eNote: If you don\u0026rsquo;t see a link when we are referencing a library, tool etc. you will find them at the bottom of the page.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eFor easy navigation here\u0026rsquo;s a table of contents:\u003c/p\u003e\n\u003cdiv\u003e\n    \u003ch2\u003eTable Of Contents\u003c/h2\u003e\n    \u003cnav id=\"TableOfContents\"\u003e\n  \u003cul\u003e\n    \u003cli\u003e\u003ca href=\"#introduction\"\u003eIntroduction\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#cairo-and-security\"\u003eCairo and Security\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#cairo-basics\"\u003eCairo Basics\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#access-control\"\u003eAccess Control\u003c/a\u003e\n      \u003cul\u003e\n        \u003cli\u003e\u003ca href=\"#role-based-access-control-rbac\"\u003eRole-based Access Control (RBAC)\u003c/a\u003e\u003c/li\u003e\n      \u003c/ul\u003e\n    \u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#storage-variables-visibility\"\u003eStorage Variables Visibility\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#type-safety\"\u003eType Safety\u003c/a\u003e\n      \u003cul\u003e\n        \u003cli\u003e\u003ca href=\"#uint256-checks\"\u003eUint256 checks\u003c/a\u003e\u003c/li\u003e\n        \u003cli\u003e\u003ca href=\"#integer-overflowunderflow\"\u003eInteger Overflow/Underflow\u003c/a\u003e\u003c/li\u003e\n      \u003c/ul\u003e\n    \u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#l1l2-operations\"\u003eL1\u0026lt;\u0026gt;L2 Operations\u003c/a\u003e\n      \u003cul\u003e\n        \u003cli\u003e\u003ca href=\"#lack-of-addresses-sanity-checks\"\u003eLack of Addresses Sanity Checks\u003c/a\u003e\u003c/li\u003e\n      \u003c/ul\u003e\n    \u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#re-entrancy\"\u003eRe-Entrancy\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#exposing-unwanted-external-functions\"\u003eExposing unwanted external functions\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#view-functions-that-modify-the-state\"\u003eView Functions that modify the state\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#missing-pausing-functionality\"\u003eMissing Pausing functionality\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#signature-replay-attacks\"\u003eSignature Replay Attacks\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#storage-variable-name-clashing\"\u003eStorage Variable Name Clashing\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#interacting-with-arbitrary-tokens\"\u003eInteracting with Arbitrary Tokens\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#missing-zero-address-checks\"\u003eMissing Zero Address Checks\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#missing-zero-value-checks\"\u003eMissing Zero Value Checks\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#toolchain-and-best-practices\"\u003eToolchain and Best Practices\u003c/a\u003e\n      \u003cul\u003e\n        \u003cli\u003e\u003ca href=\"#use-standard-andor-reputable-and-tested-libraries\"\u003eUse standard and/or reputable and tested libraries\u003c/a\u003e\u003c/li\u003e\n        \u003cli\u003e\u003ca href=\"#use-up-to-date-cairo-versions\"\u003eUse up-to-date Cairo versions\u003c/a\u003e\u003c/li\u003e\n      \u003c/ul\u003e\n    \u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#upgradable-contracts\"\u003eUpgradable Contracts\u003c/a\u003e\n      \u003cul\u003e\n        \u003cli\u003e\u003ca href=\"#deploying-your-implementation-contract\"\u003eDeploying your implementation contract\u003c/a\u003e\u003c/li\u003e\n      \u003c/ul\u003e\n    \u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#oracles\"\u003eOracles\u003c/a\u003e\n      \u003cul\u003e\n        \u003cli\u003e\u003ca href=\"#price-feeds\"\u003ePrice Feeds\u003c/a\u003e\u003c/li\u003e\n        \u003cli\u003e\u003ca href=\"#pseudo-random-number-generators\"\u003ePseudo Random Number Generators\u003c/a\u003e\u003c/li\u003e\n      \u003c/ul\u003e\n    \u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#logic-flaws\"\u003eLogic Flaws\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#frontrunning\"\u003eFrontrunning\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#governance-attacks\"\u003eGovernance Attacks\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#denial-of-service-dos\"\u003eDenial of Service (DoS)\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#not-using-static-code-analyzers\"\u003eNot using Static Code Analyzers\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#how-do-you-prepare-for-an-audit\"\u003eHow do you prepare for an audit?\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#testing-tools\"\u003eTesting Tools\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#references\"\u003eReferences\u003c/a\u003e\u003c/li\u003e\n    \u003cli\u003e\u003ca href=\"#ps\"\u003eP.S.\u003c/a\u003e\u003c/li\u003e\n  \u003c/ul\u003e\n\u003c/nav\u003e\n\u003c/div\u003e\n\u003ch2 id=\"cairo-and-security\"\u003eCairo and Security\u003c/h2\u003e\n\u003cp\u003eAlthough it can be argued that smart contracts are vulnerable to a common set of attack vectors, the idiosyncrasies of a given language can lead to unique edge cases. Furthermore, there are risks which arise from the use of a less \u0026ldquo;battle-tested\u0026rdquo; programming language such as Cairo, where the fast paced nature of the project can lead to libraries and standards being constantly updated.\u003c/p\u003e\n\u003cp\u003eWhile these standards are constantly updated and new libraries are introduced pretty much every day, it is still recommended to use popular libraries such as OpenZeppelin\u0026rsquo;s (OZ) Cairo contracts (\u003ca href=\"https://github.com/OpenZeppelin/cairo-contracts\" title=\"openzeppelin github\"\u003eavailable here\u003c/a\u003e), as re-inventing the wheel is inefficient and can result in the addition of obscure bugs within the code. Having said this, please apply caution when integrating any library in your code, and always make sure that you fully understand how they work.\u003c/p\u003e\n\u003cp\u003eBelow are presented different topics and guidelines designed to assist with development of secure Cairo code, intended to be used by both developers and auditors performing smart contract audits. Please note that this document will remain in active development and will change as features are added/removed and new attack vectors are identified. Furthermore, there are still certain areas where more research is needed.\u003c/p\u003e\n\u003cp\u003eIt should be noted that some of these scenarios below have a direct correlation to bugs that the writers observed in Solidity smart contracts and may be somewhat opinionated. Also, they are presented in no specific order.\u003c/p\u003e\n\u003ch2 id=\"cairo-basics\"\u003eCairo Basics\u003c/h2\u003e\n\u003cp\u003eCairo is built around a unique data type - the field element or \u003ccode\u003efelt\u003c/code\u003e (A\u003ccode\u003efelt\u003c/code\u003e is analogous to a integer). With this type, you can do pretty much anything you want in StarkNet. For instance, \u003ccode\u003eUint256\u003c/code\u003e which Solidity devs love, are composed of:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003elow\u003c/code\u003e - 128 bits\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ehigh\u003c/code\u003e - 128 bits\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eYou would usually go and define a \u003ccode\u003eUint256\u003c/code\u003e like this:\u003c/p\u003e\n\u003cp\u003e\u003ccode\u003elet five_uint256: Uint256 = Uint256(5, 0)\u003c/code\u003e\u003c/p\u003e\n\u003cp\u003eGoing back to \u003ccode\u003efelt\u003c/code\u003e, the range can be described using this formula, if we consider the \u003ca href=\"https://www.cairo-lang.org/docs/hello_cairo/intro.html#the-primitive-type-field-element-felt\"\u003esigned range\u003c/a\u003e:\u003c/p\u003e\n\u003cp\u003e$$-P/2 \u0026lt; x \u0026lt; P/2$$\u003c/p\u003e\n\u003cp\u003eOr the following, if we consider the \u003ca href=\"https://www.cairo-lang.org/docs/how_cairo_works/builtins.html#range-checks\"\u003eunsigned range\u003c/a\u003e:\u003c/p\u003e\n\u003cp\u003e$$ 0 \u0026lt;= x \u0026lt; P $$\u003c/p\u003e\n\u003cp\u003eWhere P is a very large prime number of \u003ccode\u003e2^251 + 17 * 2^192 + 1\u003c/code\u003e bits (note that the range check linked for the unsigned range will work on the field \u003ccode\u003e[0, 2 ** 128)\u003c/code\u003e). Doing a deep dive into the math here is somewhat out of the scope of this document, so please refer to \u003ca href=\"https://www.cairo-lang.org/docs/hello_cairo/intro.html\"\u003eCairo\u0026rsquo;s documentation\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eWith Cairo, being constrained to a single data type, certain things like for instance dealing with strings, becomes difficult. Even though many developers have written awesome libraries which make everyone\u0026rsquo;s life easier (a comprehensive list of third-party libraries can be found in \u003ca href=\"https://github.com/beautyisourbusiness/cairo-goldmine\"\u003eCairo\u0026rsquo;s Goldmine\u0026rsquo;s repository\u003c/a\u003e) this can of course lead to buggy code and security risks. For instance we can deal with strings with \u003ca href=\"https://github.com/topology-gg/caistring\"\u003ecaistring\u003c/a\u003e, and perform complex math operations with libraries such as \u003ca href=\"https://github.com/influenceth/cairo-math-64x61\"\u003ecairo-math-64x61\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eOne thing we always found interesting, is that there are no for loops in Cairo. One has to use recursion to, for instance, be able to loop through an array. The Cairo-101 \u003ca href=\"https://github.com/starknet-edu/starknet-cairo-101\"\u003erepository\u003c/a\u003e has some nice examples on how you can use recursion to calculate the sum of an array\u0026rsquo;s elements.\u003c/p\u003e\n\u003cp\u003eWhat about some more lower level details on how Cairo works?\u003c/p\u003e\n\u003cp\u003eWell, the Cairo VM has three registers:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eap\u003c/code\u003e - allocation pointer. This points to a yet-unused memory cell.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003efp\u003c/code\u003e - frame pointer. This points to the frame of the current function. This value remains the same throughout the scope of a function.\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003epc\u003c/code\u003e - program counter. Points to the current instruction.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eTo better understand how Cairo works and how to write StarkNet smart contracts, please refer to the official documentation and \u003ca href=\"https://www.cairo-lang.org/docs/index.html\"\u003etutorials\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eHaving said all of the above, let\u0026rsquo;s jump into the security considerations that you all came here for, we have broken these down into key bug classes and design concepts below.\u003c/p\u003e\n\u003ch2 id=\"access-control\"\u003eAccess Control\u003c/h2\u003e\n\u003cp\u003eWith every system, access control can be problematic if not implemented correctly. Always remember to  comply with the principle of least privilege, avoiding over assigning permissions to any account as this could be very dangerous. If one account is compromised, the whole smart contract could be taken over as well as the funds stored within.\u003c/p\u003e\n\u003ch3 id=\"role-based-access-control-rbac\"\u003eRole-based Access Control (RBAC)\u003c/h3\u003e\n\u003cp\u003eOpenZeppelin was kind enough to develop different libraries which can be used to implement access control in StarkNet contracts:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://github.com/OpenZeppelin/cairo-contracts/blob/main/openzeppelin/access/ownable.cairo\"\u003eOwnable\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://github.com/OpenZeppelin/cairo-contracts/blob/main/src/openzeppelin/access/accesscontrol/library.cairo\"\u003eAccessControl\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eFor instance we can use this code to define owners of contracts as well as define other roles. Good access control systems would include multiple roles which adhere to the principle of least privilege.\u003c/p\u003e\n\u003cp\u003eFor instance we could implement the following roles on a ERC20 contract:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eOwner\u003c/code\u003e or \u003ccode\u003eAdmin\u003c/code\u003e - Owns the contract and can transfer ownership/assign roles to others as well as perform other management activity\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eMinter\u003c/code\u003e - Can mint new tokens\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ePauser\u003c/code\u003e - Can pause the contract\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eUpgrader\u003c/code\u003e - Can upgrade the contract (in case of an upgradeable contract)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eMake sure that the roles implemented fit the purpose of the protocol, and have the least possible amount of privileges. Furthermore, use of multi-signature wallets where appropriate is highly encouraged.\u003c/p\u003e\n\u003cp\u003eLet\u0026rsquo;s have a look on how you can prevent a non-owner user from calling a function using \u003ccode\u003eownable\u003c/code\u003e.\u003c/p\u003e\n\u003cp\u003eIn our code within the constructor we will pass as argument an address, which we want to set as admin:\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-javascript\" data-lang=\"javascript\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#960050;background-color:#1e0010\"\u003e@\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003econstructor\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003efunc\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003econstructor\u003c/span\u003e{\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003esyscall_ptr\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e*\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003epedersen_ptr\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eHashBuiltin\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e*\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003erange_check_ptr\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    }(\u003cspan style=\"color:#a6e22e\"\u003eowner\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e)\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003eOwnable\u003c/span\u003e.\u003cspan style=\"color:#a6e22e\"\u003einitializer\u003c/span\u003e(\u003cspan style=\"color:#a6e22e\"\u003eowner\u003c/span\u003e)\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#66d9ef\"\u003ereturn\u003c/span\u003e ()\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003eend\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003eThis code above will call the \u003ccode\u003einitializer\u003c/code\u003e function of the \u003ccode\u003eOwnable\u003c/code\u003e library:\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-javascript\" data-lang=\"javascript\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003efunc\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003einitializer\u003c/span\u003e{\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003esyscall_ptr\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e*\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003epedersen_ptr\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eHashBuiltin\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e*\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003erange_check_ptr\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    }(\u003cspan style=\"color:#a6e22e\"\u003eowner\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u pan style=\"color:#a6e22e\"\u003ecaller\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003eend\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#66d9ef\"\u003ereturn\u003c/span\u003e ()\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003eend\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003eWhat it does is:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eget the current owner\u003c/li\u003e\n\u003cli\u003eget the caller address\u003c/li\u003e\n\u003cli\u003echecks that the caller is not the address zero\u003c/li\u003e\n\u003cli\u003echecks that the owner is equal to the caller\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eThis continues or reverts based on the result of point 3 and 4.\u003c/p\u003e\n\u003cp\u003eFurthermore, should we wish to implement more granular access control than just one single privileged role, we can use the \u003ccode\u003eAccessControl\u003c/code\u003e library (or extend the \u003ccode\u003eownable\u003c/code\u003e one, but not recommended).\u003c/p\u003e\n\u003cp\u003eWith \u003ccode\u003eAccessControl\u003c/code\u003e, we can set arbitrary roles, and have them verified in a similar fashion. In this case, we will set the admin role in the constructor of our contract, just after initializing the library. Now that we have an admin role, we can use it to set all other roles. Let\u0026rsquo;s try and implement a minter role:\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-javascript\" data-lang=\"javascript\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#960050;background-color:#1e0010\"\u003e@\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003eexternal\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003efunc\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003egrantRole\u003c/span\u003e{\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003esyscall_ptr\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e*\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003epedersen_ptr\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eHashBuiltin\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e*\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003erange_check_ptr\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    }(\u003cspan style=\"color:#a6e22e\"\u003erole\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e, \u003cspan style=\"color:#a6e22e\"\u003euser\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e)\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003eAccessControl\u003c/span\u003e.\u003cspan style=\"color:#a6e22e\"\u003egrant_role\u003c/span\u003e(\u003cspan style=\"color:#a6e22e\"\u003erole\u003c/span\u003e, \u003cspan style=\"color:#a6e22e\"\u003euser\u003c/span\u003e)\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#66d9ef\"\u003ereturn\u003c/span\u003e ()\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003eend\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003eAnd then protect our \u003ccode\u003emint\u003c/code\u003e function to only allow the \u003ccode\u003eminter\u003c/code\u003e to call it, using a modifier which looks like the one below:\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-javascript\" data-lang=\"javascript\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003efunc\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eassert_only_role\u003c/span\u003e{\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003esyscall_ptr\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e*\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003epedersen_ptr\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eHashBuiltin\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e*\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003erange_check_ptr\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    }(\u003cspan style=\"color:#a6e22e\"\u003erole\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e)\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003ealloc_locals\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#66d9ef\"\u003elet\u003c/span\u003e (\u003cspan style=\"color:#a6e22e\"\u003ecaller\u003c/span\u003e) \u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eget_caller_address\u003c/span\u003e()\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#66d9ef\"\u003elet\u003c/span\u003e (\u003cspan style=\"color:#a6e22e\"\u003eauthorized\u003c/span\u003e) \u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ehas_role\u003c/span\u003e(\u003cspan style=\"color:#a6e22e\"\u003erole\u003c/span\u003e, \u003cspan style=\"color:#a6e22e\"\u003ecaller\u003c/span\u003e)\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003ewith_attr\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eerror_message\u003c/span\u003e(\u003cspan style=\"color:#e6db74\"\u003e\u0026#34;AccessControl: caller is missing role {role}\u0026#34;\u003c/span\u003e)\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003eassert\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eauthorized\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eTRUE\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003eend\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#66d9ef\"\u003ereturn\u003c/span\u003e ()\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003eend\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003eAnd this is our code with the new added check:\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-javascript\" data-lang=\"javascript\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#960050;background-color:#1e0010\"\u003e@\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003eexternal\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003efunc\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003emint\u003c/span\u003e{\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003esyscall_ptr\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e*\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003epedersen_ptr\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eHashBuiltin\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e*\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003erange_check_ptr\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    }(\u003cspan style=\"color:#a6e22e\"\u003eto\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e, \u003cspan style=\"color:#a6e22e\"\u003eamount\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eUint256\u003c/span\u003e)\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#66d9ef\"\u003elet\u003c/span\u003e (\u003cspan style=\"color:#a6e22e\"\u003ecaller\u003c/span\u003e) \u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eget_caller_address\u003c/span\u003e()\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003eAccessControl\u003c/span\u003e.\u003cspan style=\"color:#a6e22e\"\u003eassert_only_role\u003c/span\u003e(\u003cspan style=\"color:#ae81ff\"\u003e120299592115570\u003c/span\u003e, \u003cspan style=\"color:#a6e22e\"\u003ecaller\u003c/span\u003e)\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003eERC20\u003c/span\u003e.\u003cspan style=\"color:#a6e22e\"\u003e_mint\u003c/span\u003e(\u003cspan style=\"color:#a6e22e\"\u003eto\u003c/span\u003e, \u003cspan style=\"color:#a6e22e\"\u003eamount\u003c/span\u003e)\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#66d9ef\"\u003ereturn\u003c/span\u003e ()\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003eend\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003eAnd this should fail if the caller does not have the minter role. OpenZeppelin devs have really made our lives easier, so please let\u0026rsquo;s make sure to use their libraries to better protect our contracts.\u003c/p\u003e\n\u003ch4 id=\"transfer-of-ownership-patterns\"\u003eTransfer of Ownership Patterns\u003c/h4\u003e\n\u003cp\u003eFor contracts managing user funds, it’s important that every situation is handled correctly. Something we\u0026rsquo;ve seen in abundance over many technologies are mistakes when transfering the ownership of contracts.\nWe have seen a number of different patterns being recommended to different clients in the past (especially contracts which hold large amount of user funds in escrow).\u003c/p\u003e\n\u003cp\u003eThe best approach in our opinion is to propose a new owner and with a separate call that requires them to accept ownership before it is transferred. This way, typos in the initial call will not cause financial damage, unless of course ownership is transferred to some random account which somehow notices that and accepts it.\u003c/p\u003e\n\u003cp\u003eThe logic would look something like this:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eThe owner proposes a new owner\u003c/li\u003e\n\u003cli\u003eThe proposed owner is saved in the \u003ccode\u003eproposed_owner\u003c/code\u003e storage variable\u003c/li\u003e\n\u003cli\u003eThe proposed owner calls \u003ccode\u003eaccept_ownership\u003c/code\u003e, where the contract checks that the caller address equals to the value stored in the \u003ccode\u003eproposed_owner\u003c/code\u003e storage variable, and finally transfers ownership and resets the \u003ccode\u003eproposed_owner\u003c/code\u003e\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eIn between point two and three, the original (and current) owner can call \u003ccode\u003ecancel_request\u003c/code\u003e to cancel the ownership proposal request.\u003c/p\u003e\n\u003cp\u003eAdditionally, it might be wise to keep an account owned by the contract manager as a proposed owner - so that in case we lose access to the first account, we can accept ownership with the proposed one (every little helps).\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eA member of the Spectra team submitted a \u003ca href=\"https://github.com/OpenZeppelin/cairo-contracts/pull/275\"\u003ePR\u003c/a\u003e to the \u003ccode\u003ecairo-contracts\u003c/code\u003e libraries some time back. the code works and is tested, however it will not be accepted until the Solidity version is standardized and pushed on the Solidity contracts repository.\nThis was ported from an audited Solidity version. If you do use it, it might require some changes due to OpenZeppelin having updated their contracts different times since the PR.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 id=\"storage-variables-visibility\"\u003eStorage Variables Visibility\u003c/h2\u003e\n\u003cp\u003eFirst of all, storage variables are by default public, let\u0026rsquo;s discuss this below.\u003c/p\u003e\n\u003cp\u003eWhen you define a storage variable, write and read functions are automatically created:\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-javascript\" data-lang=\"javascript\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#960050;background-color:#1e0010\"\u003e@\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003estorage_var\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003efund\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003econtract_balance\u003c/span\u003e() \u003cspan style=\"color:#f92672\"\u003e-\u0026gt;\u003c/span\u003e (\u003cspan style=\"color:#a6e22e\"\u003eres\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e)\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003eend\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003eThe above code creates a storage variable alongside the default getter/setter functions:\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-javascript\" data-lang=\"javascript\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003econtract_balance\u003c/span\u003e.\u003cspan style=\"color:#a6e22e\"\u003eread\u003c/span\u003e()\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003econtract_balance\u003c/span\u003e.\u003cspan style=\"color:#a6e22e\"\u003ewrite\u003c/span\u003e()\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003eThis is a nice and simple implementation that allows the following \u003ccode\u003ePython\u003c/code\u003e code to easily compute the \u003ccode\u003estorage_key\u003c/code\u003e, allowing the retrieval of arbitrary data stored inside a \u003ccode\u003estorage_var\u003c/code\u003e:\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-python\" data-lang=\"python\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#f92672\"\u003efrom\u003c/span\u003e starkware.starknet.public.abi \u003cspan style=\"color:#f92672\"\u003eimport\u003c/span\u003e get_storage_var_address\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003ebalance_key \u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e get_storage_var_address(\u003cspan style=\"color:#e6db74\"\u003e\u0026#39;balance\u0026#39;\u003c/span\u003e)\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003eprint(\u003cspan style=\"color:#e6db74\"\u003ef\u003c/span\u003e\u003cspan style=\"color:#e6db74\"\u003e\u0026#39;Balance key: \u003c/span\u003e\u003cspan style=\"color:#e6db74\"\u003e{\u003c/span\u003ebalance_key\u003cspan style=\"color:#e6db74\"\u003e}\u003c/span\u003e\u003cspan style=\"color:#e6db74\"\u003e\u0026#39;\u003c/span\u003e)\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003ePlease note that this should be modified if you are trying to access variables with multiple parameters (something like a mapping in Solidity):\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-python\" data-lang=\"python\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#f92672\"\u003efrom\u003c/span\u003e starkware.starknet.public.abi \u003cspan style=\"color:#f92672\"\u003eimport\u003c/span\u003e get_storage_var_address\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003euser_balance_key \u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e get_storage_var_address(\u003cspan style=\"color:#e6db74\"\u003e\u0026#39;balances\u0026#39;\u003c/span\u003e, user_address)\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003eprint(\u003cspan style=\"color:#e6db74\"\u003ef\u003c/span\u003e\u003cspan style=\"color:#e6db74\"\u003e\u0026#39;Balance key: \u003c/span\u003e\u003cspan style=\"color:#e6db74\"\u003e{\u003c/span\u003euser_balance_key\u003cspan style=\"color:#e6db74\"\u003e}\u003c/span\u003e\u003cspan style=\"color:#e6db74\"\u003e\u0026#39;\u003c/span\u003e)\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003eThe output of that code above can be used together with the following \u003ccode\u003estarknet-cli\u003c/code\u003e command to retrieve a value stored on a contract\u0026rsquo;s storage:\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-bash\" data-lang=\"bash\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003estarknet get_storage_at \u003cspan style=\"color:#ae81ff\"\u003e\\\n\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    --contract_address CONTRACT_ADDRESS \u003cspan style=\"color:#ae81ff\"\u003e\\\n\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    --key $KEY_HERE\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003eFor many use cases this is perfectly fine, but what if you wanted to store sensitive data within the contract? For example, say you were developing a battleship style game and wanted to be fully on-chain, it would be best if your opponent couldn\u0026rsquo;t see where you had deployed your ships with a simple query.\u003c/p\u003e\n\u003cp\u003eA possible solution? Hashing! (but actually we will see later that this might not even work).\u003c/p\u003e\n\u003cp\u003eLet\u0026rsquo;s take as an example this piece of code below, which allows the caller to store a variable to storage, let\u0026rsquo;s assume this is some sort of a game where people record their moves on chain.\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-javascript\" data-lang=\"javascript\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#960050;background-color:#1e0010\"\u003e@\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003eexternal\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003efunc\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eregister_move_unsafe\u003c/span\u003e{\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003esyscall_ptr\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e*\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003epedersen_ptr\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eHashBuiltin\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e*\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003erange_check_ptr\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003eecdsa_ptr\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eSignatureBuiltin\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e*\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    } (\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003emove\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    )\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#66d9ef\"\u003elet\u003c/span\u003e (\u003cspan style=\"color:#a6e22e\"\u003ecaller\u003c/span\u003e) \u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eget_caller_address\u003c/span\u003e()\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003epositions\u003c/span\u003e.\u003cspan style=\"color:#a6e22e\"\u003ewrite\u003c/span\u003e(\u003cspan style=\"color:#a6e22e\"\u003ecaller\u003c/span\u003e, \u003cspan style=\"color:#a6e22e\"\u003evalue\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003emove\u003c/span\u003e)\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#66d9ef\"\u003ereturn\u003c/span\u003e ()\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003eend\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003eThe keen eyed will notice that we are not doing any validation as to if the move is valid, but that is beside the point of this example (btw good catch, that would have been a bug for your audit report).\u003c/p\u003e\n\u003cp\u003eNow let\u0026rsquo;s retrieve this value from storage using the StarkNet cli.\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-bash\" data-lang=\"bash\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003enile send PK1 storage_example register_move_unsafe \u003cspan style=\"color:#ae81ff\"\u003e10\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003eCalling register_move_unsafe on storage_example with params: \u003cspan style=\"color:#f92672\"\u003e[\u003c/span\u003e\u003cspan style=\"color:#e6db74\"\u003e\u0026#39;10\u0026#39;\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e]\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003eInvoke transaction was sent.\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003eContract address: 0x01be5e81e5cf897169c2bddcd4e44ae679f6110752fa305ac6066ac4f502d653\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003eTransaction hash: 0x1dabf9d875aa52b246ae1165a1d9f85baf59d929ac9c8c83c9127064d29ff38\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003ekey \u003cspan st
