e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eis_le(0 + 1, 2 ** 128 + 1)\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eis_nn((2 ** 128 + 1) - 1)\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eNow \u003ccode\u003e2 ** 128 + 1 - 1\u003c/code\u003e will result in \u003ccode\u003e2 ** 128\u003c/code\u003e which is the max value of the \u003ccode\u003eRANGE_CHECK_BOUND\u003c/code\u003e thus \u003ccode\u003eis_nn\u003c/code\u003e would return 0 (as you can see from the comments - it returns \u003ccode\u003e1\u003c/code\u003e if \u003ccode\u003e0 \u0026lt;= b - a \u0026lt; RANGE_CHECK_BOUND\u003c/code\u003e)\u003c/li\u003e\n\u003cli\u003eHaving returned \u003ccode\u003e0\u003c/code\u003e, we go back to \u003ccode\u003euint256_le\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ereturn (1 - 0)\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eWe have \u003ccode\u003e1\u003c/code\u003e thus the comparison holds true\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eIf we did the same with a number smaller by just \u003ccode\u003e1\u003c/code\u003e, we would have the following:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003e\u003ccode\u003euint256_le(Uint256(0, 2 ** 128), Uint256(0 ,0))\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003euint256_lt(Uint256(0, 0), Uint256(0, 2 ** 128))\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eis_le(0 + 1, 2 ** 128)\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eis_nn((2 ** 128) - 1)\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eNow \u003ccode\u003e2 ** 128 - 1\u003c/code\u003e is just below the \u003ccode\u003eRANGE_CHECK_BOUND\u003c/code\u003e thus \u003ccode\u003eis_nn\u003c/code\u003e would return 1\u003c/li\u003e\n\u003cli\u003eHaving returned \u003ccode\u003e1\u003c/code\u003e, we go back to \u003ccode\u003euint256_le\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ereturn (1 - 1)\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003eWe have \u003ccode\u003e0\u003c/code\u003e thus the comparison holds false\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eBoth in the CTF, and in the example above, adding a \u003ccode\u003euint256_check\u003c/code\u003e at the beginning of the function, would solve this issue and given the above \u003ccode\u003eUint256\u003c/code\u003e, the call would revert.\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-javascript\" data-lang=\"javascript\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#960050;background-color:#1e0010\"\u003e@\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003eview\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003efunc\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003euint256_test_check\u003c/span\u003e{\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003esyscall_ptr\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e*\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003epedersen_ptr\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eHashBuiltin\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e*\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003erange_check_ptr\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    } (\u003cspan style=\"color:#a6e22e\"\u003enum\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eUint256\u003c/span\u003e) \u003cspan style=\"color:#f92672\"\u003e-\u0026gt;\u003c/span\u003e (\u003cspan style=\"color:#a6e22e\"\u003eres\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e)\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003ewith_attr\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eerror_message\u003c/span\u003e(\u003cspan style=\"color:#e6db74\"\u003e\u0026#34;invalid uint256\u0026#34;\u003c/span\u003e)\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003euint256_check\u003c/span\u003e(\u003cspan style=\"color:#a6e22e\"\u003enum\u003c/span\u003e)\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003eend\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#66d9ef\"\u003elet\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ezero\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eUint256\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eUint256\u003c/span\u003e(\u003cspan style=\"color:#ae81ff\"\u003e0\u003c/span\u003e, \u003cspan style=\"color:#ae81ff\"\u003e0\u003c/span\u003e)\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#66d9ef\"\u003elet\u003c/span\u003e (\u003cspan style=\"color:#a6e22e\"\u003echeck\u003c/span\u003e) \u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003euint256_le\u003c/span\u003e(\u003cspan style=\"color:#a6e22e\"\u003enum\u003c/span\u003e, \u003cspan style=\"color:#a6e22e\"\u003ezero\u003c/span\u003e)\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#66d9ef\"\u003ereturn\u003c/span\u003e (\u003cspan style=\"color:#a6e22e\"\u003echeck\u003c/span\u003e)\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003eend\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003eTrying to call the function above with the same value as before would result in an assertion being thrown:\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-bash\" data-lang=\"bash\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003etarknet call --address 0x018bbff3ce2473f7e779fbc2442cc5f0a5617789250862cba0512e2df304f70b --abi artifacts/abis/contract.json --function uint256_test_check --inputs \u003cspan style=\"color:#ae81ff\"\u003e0\u003c/span\u003e \u003cspan style=\"color:#ae81ff\"\u003e340282366920938463463374607431768211457\u003c/span\u003e --no_wallet --feeder_gateway\u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003ehttp://127.0.0.1:5050\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003eGot BadRequest \u003cspan style=\"color:#66d9ef\"\u003ewhile\u003c/span\u003e trying to access http://127.0.0.1:5050/feeder_gateway/call_contract?blockNumber\u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003epending. Status code: 500; text: \u003cspan style=\"color:#f92672\"\u003e{\u003c/span\u003e\u003cspan style=\"color:#e6db74\"\u003e\u0026#34;message\u0026#34;\u003c/span\u003e:\u003cspan style=\"color:#e6db74\"\u003e\u0026#34;/home/ctrlc3/.local/lib/python3.8/site-packages/starkware/cairo/common/uint256.cairo:23:5: Error at pc=0:193:\\nValue 340282366920938463463374607431768211457, in range check builtin 1, is out of range [0, 340282366920938463463374607431768211456).\\n    [range_check_ptr + 1] = a.high\\n    ^****************************^\\nCairo traceback (most recent call last):\\ncontracts/contract.cairo:67:6: (pc=0:505)\\nfunc uint256_test_check{\\n     ^****************^\\nError message: invalid uint256\\ncontracts/contract.cairo:73:9: (pc=0:473)\\n        uint256_check(num)\\n        ^****************^\u0026#34;\u003c/span\u003e,\u003cspan style=\"color:#e6db74\"\u003e\u0026#34;status_code\u0026#34;\u003c/span\u003e:500\u003cspan style=\"color:#f92672\"\u003e}\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003eIf you want to play with this CTF\u0026rsquo;s Cairo challenges, \u003ccode\u003eamanusk\u003c/code\u003e was kind enough to push their \u003ca href=\"https://github.com/amanusk/cairo-paradigm-ctf\"\u003esolutions\u003c/a\u003e as well as some instructions on how to run the challenges locally. In total there are three Cairo challenges.\u003c/p\u003e\n\u003ch3 id=\"integer-overflowunderflow\"\u003eInteger Overflow/Underflow\u003c/h3\u003e\n\u003cp\u003eThe history of integer over/underflows in computer science is a long and eventful story due to how data types are stored in memory. (\u003ca href=\"https://www.welivesecurity.com/2022/02/21/integer-overflow-how-it-occur-can-be-prevented/\"\u003eY2K22\u003c/a\u003e anyone?)\u003c/p\u003e\n\u003cp\u003eThis vulnerability boils down to unsafe conversion between signed and unsigned variables and integer variable types of different sizes. It is generally permitted to convert between these different types and, in many cases, the results actually make sense. However the result of an unsafe typecast can be catastrophic when dealing with sensitive values such as funds within a smart contract.\u003c/p\u003e\n\u003cp\u003eAside casting between data types, Cairo does not automatically throw a revert if the result of a math operation results in a value greater than what the data type can hold. In this case, if we add 2 to the highest value a \u003ccode\u003efelt\u003c/code\u003e can hold, the result will roll over and will be 1.\u003c/p\u003e\n\u003cp\u003eLet\u0026rsquo;s have a look at a very simple example where we are going to overflow a \u003ccode\u003efelt\u003c/code\u003e:\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-javascript\" data-lang=\"javascript\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#960050;background-color:#1e0010\"\u003e@\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003eview\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003efunc\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eoverflow\u003c/span\u003e{\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003esyscall_ptr\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e*\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003epedersen_ptr\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eHashBuiltin\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e*\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003erange_check_ptr\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    } (\u003cspan style=\"color:#a6e22e\"\u003enum1\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e, \u003cspan style=\"color:#a6e22e\"\u003enum2\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e) \u003cspan style=\"color:#f92672\"\u003e-\u0026gt;\u003c/span\u003e (\u003cspan style=\"color:#a6e22e\"\u003eres\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e)\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#66d9ef\"\u003ereturn\u003c/span\u003e (\u003cspan style=\"color:#a6e22e\"\u003enum1\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e+\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003enum2\u003c/span\u003e)\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003eend\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003eHere we are accepting two numbers and adding them up. If we pass the max value that a felt can hold, and the number 10, the contract will return the number 9 to us, as shown below.\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-bash\" data-lang=\"bash\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003estarknet call --address 0x018bbff3ce2473f7e779fbc2442cc5f0a5617789250862cba0512e2df304f70b --abi artifacts/abis/contract.json --function overflow  --inputs \u003cspan style=\"color:#ae81ff\"\u003e10\u003c/span\u003e \u003cspan style=\"color:#ae81ff\"\u003e3618502788666131213697322783095070105623107215331596699973092056135872020480\u003c/span\u003e  --no_wallet --feeder_gateway\u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003ehttp://127.0.0.1:5050\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#ae81ff\"\u003e9\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003eNote that the above will hold true for all other operations, subtraction, multiplication etc, so please  always exercise caution.\nOn top of that, should you need to implement custom types, such as \u003ccode\u003euint64\u003c/code\u003e or \u003ccode\u003euint128\u003c/code\u003e, make sure than when casting between types you implement safety checks such as the ones implemented by \u003ccode\u003euint256_check\u003c/code\u003e, which makes sure that a \u003ccode\u003eUint256\u003c/code\u003e is composed of two values at most of 128 bits each (of course adapting this to your specific type).\u003c/p\u003e\n\u003cp\u003eSo how do you prevent overflows? There are a number of secure libraries for math operations that should be used when writing Cairo contracts:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://github.com/NethermindEth/Cairo-SafeMath\"\u003efelt library from Nethermind\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://github.com/OpenZeppelin/cairo-contracts/blob/main/src/openzeppelin/security/safemath/library.cairo\"\u003eUint256 library from OpenZeppelin\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"l1l2-operations\"\u003eL1\u0026lt;\u0026gt;L2 Operations\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003eMore details on this section will be added as more interoperable protocols are built and audited.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eStarkNet is designed to allow communication with L1 contracts using \u003ccode\u003eL1\u0026lt;\u0026gt;L2\u003c/code\u003e messages. This extends the trust boundry of the smart contracts to send data between the two chains, potentially leading to complex cross chain attacks.\u003c/p\u003e\n\u003cp\u003eIn a nutshell, contracts on both Ethereum Mainnet/Testnet and StarkNet can send messages between each other. The messages from L2 are bundled automatically with the contract address sending it, and are posted on L1 to be stored on the L1 StarkNet core contract. The receiver L1 contract can then consume the message by calling the StarkNet core contract.\u003c/p\u003e\n\u003cp\u003eIt is highly recommended that arbitrary messages are not accepted and that a check on L1 is added to ensure that a message is coming from the expected origin.\u003c/p\u003e\n\u003cp\u003eOn the other hand, when sending messages from L1 to StarkNet, the message needs to be posted with the selector of the function that the sequencer should call on the L2 contract. The following is quoted from StarkNet\u0026rsquo;s documentation:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eNote that while honest Sequencers automatically consume L1 -\u0026gt; L2 messages, it is not enforced by the protocol (so a Sequencer may choose to skip a message). This should be taken into account when designing the message protocol between the two contracts.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eAfter reading the above, it is clear that while this is a very useful feature, an appropriate plan should be created before incorporating it into your protocol.\u003c/p\u003e\n\u003cp\u003ePlease refer to \u003ca href=\"https://starknet.io/docs/hello_starknet/l1l2.html\"\u003eStarknet\u0026rsquo;s documentation\u003c/a\u003e to see how it all works in more details.\u003c/p\u003e\n\u003ch3 id=\"lack-of-addresses-sanity-checks\"\u003eLack of Addresses Sanity Checks\u003c/h3\u003e\n\u003cp\u003eWith the additional complexity of sending messages between L1 and L2 chains, there can be issues with data type mismatches for elements such as addresses if the L1 address is not properly validated on L2. L1 addresses have 160 bits which is less than the number of bits a single \u003ccode\u003efelt\u003c/code\u003e type can hold.\u003c/p\u003e\n\u003cp\u003eIn summary, checks should be added when dealing with addresses to ensure that the L1 address is valid.\u003c/p\u003e\n\u003cp\u003eChainsecurity performed an \u003ca href=\"https://chainsecurity.com/wp-content/uploads/2021/12/ChainSecurity_MakerDAO_StarkNet-DAI-Bridge_audit.pdf\"\u003eaudit\u003c/a\u003e of MakerDAO DAI Bridge (Eth mainnet \u0026lt;\u0026gt; StarkNet). This is a great report which we recommend anyone to read (the part where they describe how the protocol works was very useful and something that most auditing companies miss in their reports).\u003c/p\u003e\n\u003cp\u003eHere is an extract of one of their findings:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eThe \u003ccode\u003edeposit()\u003c/code\u003e function of the \u003ccode\u003eL1DAIBridge\u003c/code\u003e contract allows users to deposit with the \u003ccode\u003eto\u003c/code\u003e address set to \u003ccode\u003e0\u003c/code\u003e. The execution of \u003ccode\u003efinalize_deposit\u003c/code\u003e initiated by the \u003ccode\u003el1_handler\u003c/code\u003e on L2 however will fail as minting DAI for the zero address will revert. As a result the deposited DAIs on L1 will be locked in the escrow.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eWe can see here that because of the lack of validation on L1, user funds could have been stuck in the escrow contract.\u003c/p\u003e\n\u003cp\u003eAnother example is given by Crytic (ToB) on their \u003ca href=\"https://github.com/crytic/building-secure-contracts/tree/master/not-so-smart-contracts/cairo/L1_to_L2_address_conversion\"\u003enot-so-smart-contracts repo\u003c/a\u003e.\u003c/p\u003e\n\u003ch2 id=\"re-entrancy\"\u003eRe-Entrancy\u003c/h2\u003e\n\u003cp\u003eRe-entrancy attacks have a sordid history on L1 chains such as Ethereum for the potential to cause catastrophic financial damage to contracts that do not implement strong re-entrancy guards. The most impactful of these resulting in the \u003ca href=\"https://coinmarketcap.com/alexandria/article/a-history-of-the-dao-hack\"\u003eforking of Ethereum\u003c/a\u003e back in 2016, re-entrancy attacks are still actively \u003ca href=\"https://www.coindesk.com/tech/2022/03/31/ola-finance-exploited-for-36m-in-re-entrancy-attack/\"\u003eexploited in the wild\u003c/a\u003e in 2022.\u003c/p\u003e\n\u003cp\u003eRe-entrancy is possible within StarkNet too, so make sure to use re-entrancy guards. As mentioned this issue is still actively exploited in many smart contracts languages, and while devs are more frequently using the appropriate libraries where needed, guards should be used in all StarkNet contracts as well (where appropriate of course).\u003c/p\u003e\n\u003cp\u003eOn top of that, and probably even more importantly, devs should always remember to follow the \u003ca href=\"https://fravoll.github.io/solidity-patterns/checks_effects_interactions.html\"\u003echeck-effect-interaction\u003c/a\u003e pattern which states:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u0026ldquo;We should not make any changes to state variables, after interacting with external entities, as we cannot rely on the execution of any code coming after the interaction\u0026rdquo; - \u003ca href=\"https://fravoll.github.io/solidity-patterns/checks_effects_interactions.html\"\u003efravoll website\u003c/a\u003e.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eLuckily OpenZeppelin has implemented a \u003ca href=\"https://github.com/OpenZeppelin/cairo-contracts/blob/main/src/openzeppelin/security/reentrancyguard/library.cairo\"\u003ere-entrancy guard\u003c/a\u003e for Cairo as well.\u003c/p\u003e\n\u003cp\u003eThis can be used as follow:\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-javascript\" data-lang=\"javascript\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003eReentrancyGuard\u003c/span\u003e.\u003cspan style=\"color:#a6e22e\"\u003e_start\u003c/span\u003e()\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e[\u003cspan style=\"color:#a6e22e\"\u003eyou\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ecode\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ehere\u003c/span\u003e]\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003eReentrancyGuard\u003c/span\u003e.\u003cspan style=\"color:#a6e22e\"\u003e_end\u003c/span\u003e()\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003eThe code is very simple but effective:\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-javascript\" data-lang=\"javascript\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003efunc\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003e_start\u003c/span\u003e{\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003esyscall_ptr\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e*\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003epedersen_ptr\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eHashBuiltin\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e*\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003erange_check_ptr\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    }()\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#66d9ef\"\u003elet\u003c/span\u003e (\u003cspan style=\"color:#a6e22e\"\u003ehas_entered\u003c/span\u003e) \u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eReentrancyGuard_entered\u003c/span\u003e.\u003cspan style=\"color:#a6e22e\"\u003eread\u003c/span\u003e()\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003ewith_attr\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eerror_message\u003c/span\u003e(\u003cspan style=\"color:#e6db74\"\u003e\u0026#34;ReentrancyGuard: reentrant call\u0026#34;\u003c/span\u003e)\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003eassert\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ehas_entered\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eFALSE\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003eend\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003eReentrancyGuard_entered\u003c/span\u003e.\u003cspan style=\"color:#a6e22e\"\u003ewrite\u003c/span\u003e(\u003cspan style=\"color:#a6e22e\"\u003eTRUE\u003c/span\u003e)\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#66d9ef\"\u003ereturn\u003c/span\u003e ()\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003eend\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003efunc\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003e_end\u003c/span\u003e{\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003esyscall_ptr\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e*\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003epedersen_ptr\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eHashBuiltin\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e*\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003erange_check_ptr\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    }()\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003eReentrancyGuard_entered\u003c/span\u003e.\u003cspan style=\"color:#a6e22e\"\u003ewrite\u003c/span\u003e(\u003cspan style=\"color:#a6e22e\"\u003eFALSE\u003c/span\u003e)\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#66d9ef\"\u003ereturn\u003c/span\u003e ()\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003eend\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003eWe can see, that by adding \u003ccode\u003eReentrancyGuard._start\u003c/code\u003e at the beginning of a function (and don\u0026rsquo;t forget to add \u003ccode\u003eReentrancyGuard._end\u003c/code\u003e), should the function be re-entered, the \u003ccode\u003eReentrancyGuard._start\u003c/code\u003e would be triggered again, and after looking up storage again it would see that \u003ccode\u003ehas_entered\u003c/code\u003e is now \u003ccode\u003eTRUE\u003c/code\u003e leading to the assertion failing.\u003c/p\u003e\n\u003cp\u003eThe above was taken from OZ\u0026rsquo;s repo, where there are some mock contracts which show a couple of examples where the reentrancy guard is in use:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://github.com/OpenZeppelin/cairo-contracts/blob/main/tests/mocks/ReentrancyMock.cairo\"\u003etarget_contract\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://github.com/OpenZeppelin/cairo-contracts/blob/main/tests/mocks/ReentrancyAttackerMock.cairo\"\u003eattacker\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eTo sum up, always follow the checks-effects-interaction pattern where possible, and when interacting with external contracts, make sure that appropriate safeguards are in place such as the aforementioned reentrancy guard.\u003c/p\u003e\n\u003ch2 id=\"exposing-unwanted-external-functions\"\u003eExposing unwanted external functions\u003c/h2\u003e\n\u003cp\u003eDue to how StarkNet smart contracts work, if you import a module with external functions in your contract, they will be automatically exposed. Most often than not, this is something that you might want, but it is important to make sure that sensitive functions are not exposed. Imagine you missed access control there, and an attacker could steal funds.\u003c/p\u003e\n\u003cp\u003eIn order to counter this, developers should follow the \u003cem\u003e\u003cstrong\u003eExtensibility\u003c/strong\u003e\u003c/em\u003e \u003ca href=\"https://docs.openzeppelin.com/contracts-cairo/0.3.1/extensibility\"\u003epattern\u003c/a\u003e. The linked version is the most up-to-date one released by OpenZeppelin.\u003c/p\u003e\n\u003cp\u003eIn short, code should be divided in libraries and contracts. Reusable logic and storage variables should go into a library, which are not to be deployed. These should be then imported as appropriate in the smart contract inside external or internal functions as deemed necessary by the developers. For more details, please read OZ\u0026rsquo;s post.\u003c/p\u003e\n\u003cp\u003eOne cool example was proposed in 2022\u0026rsquo;s Paradigm CTF. The \u003ccode\u003ecairo-proxy\u003c/code\u003e \u003ca href=\"https://ctf.paradigm.xyz/challenges/cairo-proxy\"\u003echallenge\u003c/a\u003e, exposed an external function which allowed anyone to change the storage of a contract (there was another mistake here related to the Proxy pattern but that\u0026rsquo;s for another section). From this point, one could be solving the challenge in different ways, for instance by changing the initialized state of the contract and re-initializing it to be the \u003ccode\u003eowner\u003c/code\u003e, or directly change the owner and mint new tokens, or amending its balance.\u003c/p\u003e\n\u003cp\u003eAn example of the \u003ccode\u003eUtils.cairo\u003c/code\u003e code with a dangerously exposed \u003ccode\u003eexternal\u003c/code\u003e function has been included below:\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-javascript\" data-lang=\"javascript\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#f92672\"\u003e%\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003elang\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003estarknet\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003efrom\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003estarkware\u003c/span\u003e.\u003cspan style=\"color:#a6e22e\"\u003estarknet\u003c/span\u003e.\u003cspan style=\"color:#a6e22e\"\u003ecommon\u003c/span\u003e.\u003cspan style=\"color:#a6e22e\"\u003esyscalls\u003c/span\u003e \u003cspan style=\"color:#66d9ef\"\u003eimport\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003estorage_read\u003c/span\u003e, \u003cspan style=\"color:#a6e22e\"\u003estorage_write\u003c/span\u003e, \u003cspan style=\"color:#a6e22e\"\u003eget_caller_address\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e[\u003cspan style=\"color:#a6e22e\"\u003esnip\u003c/span\u003e]\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#960050;background-color:#1e0010\"\u003e@\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003eexternal\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003efunc\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eauth_write_storage\u003c/span\u003e{\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003esyscall_ptr\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e*\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    }(\u003cspan style=\"color:#a6e22e\"\u003eauth_account\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e, \u003cspan style=\"color:#a6e22e\"\u003eaddress\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e, \u003cspan style=\"color:#a6e22e\"\u003evalue\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e)\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#66d9ef\"\u003elet\u003c/span\u003e (\u003cspan style=\"color:#a6e22e\"\u003ecaller\u003c/span\u003e) \u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eget_caller_address\u003c/span\u003e()\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003eassert\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ecaller\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eauth_account\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003estorage_write\u003c/span\u003e(\u003cspan style=\"color:#a6e22e\"\u003eaddress\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003eaddress\u003c/span\u003e, \u003cspan style=\"color:#a6e22e\"\u003evalue\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003evalue\u003c/span\u003e)\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#66d9ef\"\u003ereturn\u003c/span\u003e()\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003eend\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003eGiven a \u003ccode\u003estorage_var\u003c/code\u003e key and a value, an user could overwrite the storage of the \u003ccode\u003ealmost_erc20\u003c/code\u003e contract.\u003c/p\u003e\n\u003cp\u003eWe can see another example on \u003ccode\u003eCrytic\u003c/code\u003e\u0026rsquo;s \u003ca href=\"https://github.com/crytic/building-secure-contracts/tree/master/not-so-smart-contracts/cairo/dangerous_public_imports_in_libraries\"\u003erepo\u003c/a\u003e.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eNote: Since \u003ca href=\"https://github.com/starkware-libs/cairo-lang/releases/tag/v0.10.0\"\u003eCairo v0.10.0\u003c/a\u003e, this issue has been fixed and only directly imported functions with the \u003ccode\u003e@external\u003c/code\u003e and \u003ccode\u003e@view\u003c/code\u003e decorator are exposed. All contracts compiled and deployed with previous versions are of course still vulnerable.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 id=\"view-functions-that-modify-the-state\"\u003eView Functions that modify the state\u003c/h2\u003e\n\u003cp\u003eWhile Solidity developers might be used to the pattern that \u003ccode\u003eview\u003c/code\u003e functions do not modify state, this is not enforced in StarkNet \u003cstrong\u003eyet\u003c/strong\u003e. Therefore, leaving some functionality in a \u003ccode\u003eview\u003c/code\u003e function that modifies state, might be very dangerous.\u003c/p\u003e\n\u003cp\u003eUntil this is enfocred, it is recommended to make sure that \u003ccode\u003eview\u003c/code\u003e function are only used to read data from storage or to perform certain calculations (something like a helper function which you want to make public).\u003c/p\u003e\n\u003cp\u003eWe can see an example in \u003ccode\u003eCrytic\u003c/code\u003e\u0026rsquo;s \u003ca href=\"https://github.com/crytic/building-secure-contracts/tree/master/not-so-smart-contracts/cairo/view_state\"\u003erepo\u003c/a\u003e.\u003c/p\u003e\n\u003ch2 id=\"missing-pausing-functionality\"\u003eMissing Pausing functionality\u003c/h2\u003e\n\u003cp\u003eThanks to OpenZeppelin, we have the \u003ccode\u003ePausable\u003c/code\u003e library available which permits contracts to be paused by one account (usually the owner or a specific role which can only pause contracts). This is extremely useful as in the event of an attack, devs can quickly pause the contract and prevent further exploits, while they work on mitigating/fixing the issue.\u003c/p\u003e\n\u003cp\u003eThis is as simple as adding the following function call to contract functions from \u003ca href=\"https://github.com/OpenZeppelin/cairo-contracts/blob/main/src/openzeppelin/security/pausable/library.cairo\"\u003ecairo-contracts\u003c/a\u003e:\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-javascript\" data-lang=\"javascript\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003ePausable\u003c/span\u003e.\u003cspan style=\"color:#a6e22e\"\u003eassert_not_paused\u003c/span\u003e()\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003eAnd then use \u003ccode\u003e_pause\u003c/code\u003e and \u003ccode\u003e_unpause\u003c/code\u003e to pause the contract.\u003c/p\u003e\n\u003cp\u003eThe following extract from one of the mock contracts of OZ\u0026rsquo;s library is show below, where all of these functions are in use.\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-javascript\" data-lang=\"javascript\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003efrom\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eopenzeppelin\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e/\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003esecurity\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e/\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003epausable\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e/\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003elibrary\u003c/span\u003e \u003cspan style=\"color:#66d9ef\"\u003eimport\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ePausable\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#960050;background-color:#1e0010\"\u003e@\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003eexternal\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003efunc\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003enormalProcess\u003c/span\u003e{\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003esyscall_ptr\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e*\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003epedersen_ptr\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eHashBuiltin\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e*\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003erange_check_ptr\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    }()\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003ePausable\u003c/span\u003e.\u003cspan style=\"color:#a6e22e\"\u003eassert_not_paused\u003c/span\u003e()\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#66d9ef\"\u003elet\u003c/span\u003e (\u003cspan style=\"color:#a6e22e\"\u003ecurrentCount\u003c/span\u003e) \u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ecount\u003c/span\u003e.\u003cspan style=\"color:#a6e22e\"\u003eread\u003c/span\u003e()\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003ecount\u003c/span\u003e.\u003cspan style=\"color:#a6e22e\"\u003ewrite\u003c/span\u003e(\u003cspan style=\"color:#a6e22e\"\u003ecurrentCount\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e+\u003c/span\u003e \u003cspan style=\"color:#ae81ff\"\u003e1\u003c/span\u003e)\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#66d9ef\"\u003ereturn\u003c/span\u003e ()\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003eend\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#960050;background-color:#1e0010\"\u003e@\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003eexternal\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003efunc\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003epause\u003c/span\u003e{\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003esyscall_ptr\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e*\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003epedersen_ptr\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eHashBuiltin\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e*\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003erange_check_ptr\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    }()\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#960050;background-color:#1e0010\"\u003e#\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eOwnable\u003c/span\u003e.\u003cspan style=\"color:#a6e22e\"\u003eonlyOwner\u003c/span\u003e() \u003cspan style=\"color:#a6e22e\"\u003enot\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003epart\u003c/span\u003e \u003cspan style=\"color:#66d9ef\"\u003eof\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ethe\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003emock\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ecode\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ebut\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eadded\u003c/span\u003e \u003cspan style=\"color:#66d9ef\"\u003efor\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ecorrectness\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003ePausable\u003c/span\u003e.\u003cspan style=\"color:#a6e22e\"\u003e_pause\u003c/span\u003e()\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#66d9ef\"\u003ereturn\u003c/span\u003e ()\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003eend\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#960050;background-color:#1e0010\"\u003e@\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003eexternal\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003efunc\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eunpause\u003c/span\u003e{\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003esyscall_ptr\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e*\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003epedersen_ptr\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eHashBuiltin\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e*\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003erange_check_ptr\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    }()\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#960050;background-color:#1e0010\"\u003e#\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eOwnable\u003c/span\u003e.\u003cspan style=\"color:#a6e22e\"\u003eonlyOwner\u003c/span\u003e() \u003cspan style=\"color:#a6e22e\"\u003enot\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003epart\u003c/span\u003e \u003cspan style=\"color:#66d9ef\"\u003eof\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ethe\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003emock\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ecode\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ebut\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eadded\u003c/span\u003e \u003cspan style=\"color:#66d9ef\"\u003efor\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ecorrectness\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003ePausable\u003c/span\u003e.\u003cspan style=\"color:#a6e22e\"\u003e_unpause\u003c/span\u003e()\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#66d9ef\"\u003ereturn\u003c/span\u003e ()\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003eend\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003eOf course, for the \u003ccode\u003epause\u003c/code\u003e and \u003ccode\u003eunpause\u003c/code\u003e functions, make sure you are using strong access controls to prevent unintended actors from calling these functions in your contracts.\u003c/p\u003e\n\u003ch2 id=\"signature-replay-attacks\"\u003eSignature Replay Attacks\u003c/h2\u003e\n\u003cp\u003eThese types of attacks are very common in Solidity and there are various types of them:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eTraditional Replay attacks - we will go into detail below\u003c/li\u003e\n\u003cli\u003eCross-Chain replay attacks - (In StarkNet it will be a problem when a signature on testnet can be replayed on mainnet). The solution in Solidity is to use an hash separator with the \u003ccode\u003echainId\u003c/code\u003e and data that identifies one contract from the other, so the same should be followed where appropriate\u003c/li\u003e\n\u003cli\u003eSignature malleability attacks (these will be dependent on the implementation)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eOne key takeaway from these attacks is to always make sure that an unique value (often called a \u003cem\u003e\u003cstrong\u003enonce\u003c/strong\u003e\u003c/em\u003e) is used. For instance, in token contracts that allow transfers via signatures (hence allowing the entity which originates the request to not pay any gas fee as the signature is done off-chain), it would be nice to keep a mapping of nonce values for each users. Something like the example below:\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-javascript\" data-lang=\"javascript\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#960050;background-color:#1e0010\"\u003e@\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003estorage_var\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003efunc\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003enonces\u003c/span\u003e(\u003cspan style=\"color:#a6e22e\"\u003eaddress\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e) \u003cspan style=\"color:#f92672\"\u003e-\u0026gt;\u003c/span\u003e (\u003cspan style=\"color:#a6e22e\"\u003enonce\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e)\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003eend\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003eEach time we make use of the nonce in our function calls, we should increase it by one, and our signing infrastructure should first fetch the current nonce value, and create a signature for the transaction.\u003c/p\u003e\n\u003cp\u003eLet\u0026rsquo;s look at some vulnerable code. For this we assume that we have a contract for a Play-2-Earn (P2E) browser-based game. Users can play in their browser, and once they finish the game, they are rewarded some in-game (and fully off-chain) currency. This currency is exchangeable 1-1 to the ecosystem token, and users need a valid signature for the contract call to work (note that this needs to be signed by a \u003ccode\u003esigner\u003c/code\u003e controlled by the protocol and include the user\u0026rsquo;s address and amount of tokens).\u003c/p\u003e\n\u003cp\u003eTo keep this example as simple as possible, let\u0026rsquo;s assume that the in-game currency supply is infinite (We know, not too smart considering it is exchangeable 1-1 with the ecosystem token).\u003c/p\u003e\n\u003cp\u003eThe code in charge of converting the in-game currency to the ecosystem token is the following:\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-javascript\" data-lang=\"javascript\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#960050;background-color:#1e0010\"\u003e@\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003eexternal\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003efunc\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eswap_game_currency\u003c/span\u003e{\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003esyscall_ptr\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e*\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003epedersen_ptr\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eHashBuiltin\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e*\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003erange_check_ptr\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003eecdsa_ptr\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eSignatureBuiltin\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e*\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    }(\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003er\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003es\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u00 ress\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003etoken_address_\u003c/span\u003e, \u003cspan style=\"color:#a6e22e\"\u003esender\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003econtract_address\u003c/span\u003e, \u003cspan style=\"color:#a6e22e\"\u003erecipient\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003ecaller_address\u003c/span\u003e, \u003cspan style=\"color:#a6e22e\"\u003eamount\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003eUint256\u003c/span\u003e(\u003cspan style=\"color:#a6e22e\"\u003eamount\u003c/span\u003e, \u003cspan style=\"color:#ae81ff\"\u003e0\u003c/span\u003e))\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#66d9ef\"\u003ereturn\u003c/span\u003e ()\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003eend\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003eAs you can see, what we do differently here is add a \u003cem\u003e\u003cstrong\u003enonce\u003c/strong\u003e\u003c/em\u003e value to the function. As mentioned above, the backend would first pull the nonce value for an account, and use it to generate the signature. For each function call, the current user nonce is pulled from storage, and increased by 1, so that the next call will use the updated value.\u003c/p\u003e\n\u003ch2 id=\"storage-variable-name-clashing\"\u003eStorage Variable Name Clashing\u003c/h2\u003e\n\u003cp\u003eTLDR - Name storage variables differently in contract libraries as if you import a namespace, two storage variables with the same name will confuse the compiler.\u003c/p\u003e\n\u003cp\u003eAs Andrew Fleming from OZ states:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u0026ldquo;The interesting question with this pattern is: if libraries set their own state with storage variables, what happens when a contract imports from multiple libraries that share the same name for those storage variables?\u0026rdquo;\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eHis \u003ca href=\"https://medium.com/coinmonks/storage-variable-clashing-in-starknet-ce5f28e60886\"\u003eblog-post\u003c/a\u003e has the perfect example which shows how this bug works, please refer to that article.\u003c/p\u003e\n\u003cp\u003eThe proposed solution is to name storage variables accordingly. For instance two storage variables both meant to be storing some balance, could be named as:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eLibraryA_balance\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eLibraryB_balance\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eAnd if you want to have a go at exploiting this vulnerability, here is the \u003ca href=\"https://github.com/milancermak/cairo-underhanded\"\u003ewinning\u003c/a\u003e submission of the Cairo underhanded challenge. (Contest by \u003ca href=\"https://twitter.com/nethermindeth\"\u003eNethermind\u003c/a\u003e and submission by \u003ca href=\"https://twitter.com/milancermak\"\u003e@milancermak\u003c/a\u003e).\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eNote: Since \u003ca href=\"https://github.com/starkware-libs/cairo-lang/releases/tag/v0.10.0\"\u003eCairo v0.10.0\u003c/a\u003e, this issue has been fixed, as the compiler now enforces that all storage variables between modules are unique. The proposed solution to keep the storage variable names unique still applies. All contracts compiled and deployed with previous versions are of course still vulnerable.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 id=\"interacting-with-arbitrary-tokens\"\u003eInteracting with Arbitrary Tokens\u003c/h2\u003e\n\u003cp\u003eWhen interacting with arbitrary tokens, always make sure that transfers are validated with appropriate balance checks as these tokens might not implement the same logic on transfer.\u003c/p\u003e\n\u003cp\u003eImagine you are using some untrusted token in your contract. We recommend to check that the balance before, and the balance after match the amount transferred. This could be the case in a AMM with no limitation as to which token can be exchanged.\u003c/p\u003e\n\u003cp\u003ePseudo-code steps:\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-javascript\" data-lang=\"javascript\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#66d9ef\"\u003elet\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ebalance_before\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ebalances\u003c/span\u003e.\u003cspan style=\"color:#a6e22e\"\u003eread\u003c/span\u003e(\u003cspan style=\"color:#a6e22e\"\u003euser1\u003c/span\u003e)\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003etransfer\u003c/span\u003e(\u003cspan style=\"color:#a6e22e\"\u003etoken\u003c/span\u003e, \u003cspan style=\"color:#a6e22e\"\u003ereceiver\u003c/span\u003e, \u003cspan style=\"color:#a6e22e\"\u003eamount\u003c/span\u003e)\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#66d9ef\"\u003elet\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ebalance_now\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ebalances\u003c/span\u003e.\u003cspan style=\"color:#a6e22e\"\u003eread\u003c/span\u003e(\u003cspan style=\"color:#a6e22e\"\u003euser2\u003c/span\u003e)\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#66d9ef\"\u003eif\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ebalance_now\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e!=\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ebalance_before\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e+\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eamount\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003erevert\u003c/span\u003e(\u003cspan style=\"color:#e6db74\"\u003e\u0026#34;Transfer failed\u0026#34;\u003c/span\u003e)\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003eLet\u0026rsquo;s take as an example a super simple and probably buggy \u0026ldquo;malicious\u0026rdquo; token that slightly modified OpenZeppelin\u0026rsquo;s ERC20 library:\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-javascript\" data-lang=\"javascript\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#960050;background-color:#1e0010\"\u003e@\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003eexternal\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003efunc\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003etransferFrom\u003c/span\u003e{\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003esyscall_ptr\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e*\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003epedersen_ptr\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eHashBuiltin\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e*\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003erange_check_ptr\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    }(\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003esender\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003erecipient\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003eamount\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eUint256\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    ) \u003cspan style=\"color:#f92672\"\u003e-\u0026gt;\u003c/span\u003e (\u003cspan style=\"color:#a6e22e\"\u003esuccess\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u0
