      projects: [{"body":"Formerly Enclave. Enables private collaboration on confidential data for use cases like medical research, sealed-bid auctions, and voting. I implement and integrate FHE / ZK / MPC primitives into the Rust node software and architect cross-layer connections between Noir circuits, Solidity contracts, and the node.","link":"https://github.com/gnosisguild/enclave","role":"Senior Engineer","slug":"interfold","status":"In development","tag":"Open-source protocol for confidential coordination using FHE, MPC, and ZK.","tags":["RUST","SOLIDITY","NOIR","TS"],"title":"THE INTERFOLD","year":"2025"},{"body":"A demo application showcasing the Interfold's capabilities: a coercion-resistant on-chain voting protocol using FHE for confidential ballots.","link":"https://blog.theinterfold.com/vote-masking-receipt-freeness-secret-ballots/","role":"Engineer","slug":"crisp","status":"Demo","tag":"Coercion-resistant voting protocol built on the Interfold network.","tags":["RUST","FHE","ZK"],"title":"CRISP","year":"2025"},{"body":"Vitalik's original proposal for an on-chain voting system that keeps individual ballots private while still publishing a verifiable tally. Primary technical owner at PSE — drove the roadmap, shipped Circom circuits and Solidity contracts, coordinated audits, and pushed the protocol from a research artifact toward something real teams could deploy.","link":"https://maci.pse.dev","role":"Team Lead","slug":"maci","status":"Production","tag":"Private, coercion-free, censorship-resistant on-chain voting using zk-SNARKs.","tags":["TS","SOLIDITY","CIRCOM"],"title":"MACI","year":"2024"},{"body":"A widely-used ZK protocol that lets people prove membership in a group and broadcast anonymous signals — the building block under a lot of private-voting and anonymous-DAO tooling. Took on technical direction and release coordination in 2025, alongside MACI.","link":"https://semaphore.pse.dev","role":"Team Lead","slug":"semaphore","status":"Production","tag":"Zero-knowledge protocol for anonymous signaling and group membership.","tags":["TS","SOLIDITY","CIRCOM"],"title":"SEMAPHORE","year":"2025"},{"body":"Built and operated the infrastructure that automates Groth16 phase-2 ceremonies — Terraform IaC, Firebase/GCP serverless components, AWS EC2/Lambda/S3/SNS, and CI/CD pipelines.","link":"https://github.com/privacy-scaling-explorations/p0tion","role":"Engineer","slug":"p0tion","status":"Open source","tag":"Framework for running zk-SNARK phase-2 trusted-setup ceremonies.","tags":["NODE","TERRAFORM","AWS","FIREBASE"],"title":"P0TION","year":"2023"},{"body":"The contributor-facing UI for p0tion — lets anyone contribute entropy to live trusted-setup ceremonies from the browser, with progress and audit trails.","link":"https://github.com/privacy-scaling-explorations/DefinitelySetup","role":"Engineer","slug":"definitelysetup","status":"Open source","tag":"Frontend for monitoring and contributing to p0tion ceremonies.","tags":["REACT","GH-ACTIONS"],"title":"DEFINITELYSETUP","year":"2023"},{"body":"Composable gatekeeper primitives for permissioned on-chain coordination — used to gate access to MACI polls and similar systems.","link":"https://github.com/privacy-scaling-explorations/excubiae","role":"Contributor","slug":"excubiae","status":"Open source","tag":"Modular framework for on-chain gatekeepers.","tags":["SOLIDITY","TS"],"title":"EXCUBIAE","year":"2024"},{"body":"A monorepo of utilities used across PSE's ZK stack — Merkle trees, identity, proof helpers. Led release coordination and direction in 2025.","link":"https://github.com/privacy-scaling-explorations/zk-kit","role":"Team Lead","slug":"zk-kit","status":"Open source","tag":"Reusable libraries for zero-knowledge applications.","tags":["TS","CIRCOM","NOIR"],"title":"ZK-KIT","year":"2025"},{"body":"Exploring k-means as a more SNARK-friendly collusion detector for QF rounds — alternative to pairwise matching for use inside ZK circuits.","link":"https://github.com/ctrlc03/qfi-kmeans","role":"Author","slug":"qfi-kmeans","status":"Research","tag":"Anti-collusion research for quadratic funding via k-means clustering.","tags":["PYTHON","RESEARCH"],"title":"QFI-KMEANS","year":"2023"}],
      posts:    [{"body":"\u003ch1 id=\"devlog---0606---3006\"\u003eDevlog - 06/06 - 30/06\u003c/h1\u003e\n\u003cp\u003e\u003ca href=\"https://github.com/ctrlc03/qfi-kmeans\"\u003eResearching\u003c/a\u003e anti collusion solutions for quadratic voting and quadratic funding and scaling \u003ca href=\"https://github.com/privacy-scaling-explorations/p0tion\"\u003ep0tion\u003c/a\u003e using EC2.\u003c/p\u003e\n\u003ch2 id=\"qf-and-k-means\"\u003eQF and k-means\u003c/h2\u003e\n\u003cp\u003eQuadratic funding (or quadratic voting) is prone to collusion. Users might be able to influcence the result of a round by colluding with each others and vote (or allocate funds) to certain projects to \u0026ldquo;extort\u0026rdquo; a larger amount from the matching pool.\u003c/p\u003e\n\u003cp\u003eIn order to prevent this, qf formulas include a penalization coefficient which reduce the amount of matching pool received by a project, based on the user\u0026rsquo;s ballot coefficient. A common technique is called pairwise matching, where each pair of votes is checked and a coefficient associated based on the similarities between them. While effective to detect some sort of collusion, it is not very efficient to verify using a zk-SNARK circuit, and cannot detect more complex types of collusion such as second order behavior (group think or copy and paste from social media).\u003c/p\u003e\n\u003cp\u003eDuring these past few weeks, I have looked into how we could use a simple clustering algorithm, k-means, to detect collusion in qf/qv.\u003c/p\u003e\n\u003ch3 id=\"k-means-basics\"\u003ek-means basics\u003c/h3\u003e\n\u003cp\u003ek-means is a simple clustering algorithm that works as follow:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eselect random k datapoints as initial centroids -\u0026gt; these will be the initial clusters centers\u003c/li\u003e\n\u003cli\u003efor each point in the dataset, calculate the distance from each centeroid (k-means usually uses eucledian distance). Assign these points to the cluster with the nearest centeroid\u003c/li\u003e\n\u003cli\u003ethe centeroids will change based on the mean of the points assigned to the cluster\u003c/li\u003e\n\u003cli\u003ewith the updated centeroids we now calculate the distance of the points to each centeroid again\u003c/li\u003e\n\u003cli\u003erepeat the above two steps until a max number of iterations or convergence is reached (Convergence is typically determined by checking if the centroids no longer move significantly between iterations or if the assignments of data points to clusters stabilize)\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003eNote that is important to choose an appropriate k value which depends on the data that is to be analized. At this time, a formula was not chosen yet.\u003c/p\u003e\n\u003ch3 id=\"how-to-apply-k-means-to-qfqv\"\u003eHow to apply k-means to QF/QV\u003c/h3\u003e\n\u003cp\u003eWith the output of a round, we have an array of user ballots. Each ballot represents the votes and weight for each project. After selecting a k value and the random ballots which are to be the centroids, we can assign the other ballots to their cluster based on the distance between the centroid and the ballot, and repeat until the difference in centroids is within a certain treshold.\u003c/p\u003e\n\u003cp\u003eAfter the algorithm has run, we can calculate the coefficient based on how many ballots are within each cluster. The formula is:\u003c/p\u003e\n\u003cp\u003e$1/clusterSize$\u003c/p\u003e\n\u003cp\u003eNow, we can assign the coefficient to each ballot based on its assignment in the centroid and calculate the QF as follows:\u003c/p\u003e\n\u003cp\u003e$SUM([1\u003cem\u003es,4\u003c/em\u003er,9*t]**0.5)**2$\u003c/p\u003e\n\u003cp\u003ewhere s,r,t and the coefficients for each corresponding user vote.\u003c/p\u003e\n\u003ch3 id=\"how-to-implement-a-k-means-algorithm-in-typescript\"\u003eHow to implement a k-means algorithm in TypeScript\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003eThe code can be found on \u003ca href=\"https://github.com/ctrlc03/qfi-kmeans/tree/main/src/ts\"\u003eGitHub\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eThe TS implementation includes a number of functions:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003edata parsing related functions (converting JSON input to an object, adding zero votes to even out the ballot vectors) (\u003ca href=\"https://github.com/ctrlc03/qfi-kmeans/blob/main/src/ts/k-means.ts#L10-L108\"\u003eref\u003c/a\u003e)\u003c/li\u003e\n\u003cli\u003ecalculating the initial centroids by selecting random ballots for each cluster (\u003ca href=\"https://github.com/ctrlc03/qfi-kmeans/blob/main/src/ts/k-means.ts#L116\"\u003eref\u003c/a\u003e)\u003c/li\u003e\n\u003cli\u003ecalculating the distance between a centroid and a ballot (\u003ca href=\"https://github.com/ctrlc03/qfi-kmeans/blob/main/src/ts/k-means.ts#L179\"\u003eref\u003c/a\u003e)\u003c/li\u003e\n\u003cli\u003eassigning ballots to clusters based on the distance between them (\u003ca href=\"https://github.com/ctrlc03/qfi-kmeans/blob/main/src/ts/k-means.ts#L212\"\u003eref\u003c/a\u003e)\u003c/li\u003e\n\u003cli\u003eupdating the centroids by calculating the mean of the ballots within the centroid itself (\u003ca href=\"https://github.com/ctrlc03/qfi-kmeans/blob/main/src/ts/k-means.ts#L257\"\u003eref\u003c/a\u003e)\u003c/li\u003e\n\u003cli\u003echecking if clusters have converged (\u003ca href=\"https://github.com/ctrlc03/qfi-kmeans/blob/main/src/ts/k-means.ts#L432\"\u003eref\u003c/a\u003e)\u003c/li\u003e\n\u003cli\u003ecalculating cluster size, coefficients and assigning coefficients to users (\u003ca href=\"https://github.com/ctrlc03/qfi-kmeans/blob/main/src/ts/k-means.ts#L294-L351\"\u003eref\u003c/a\u003e)\u003c/li\u003e\n\u003cli\u003ecalculating the QF using the coefficients (\u003ca href=\"https://github.com/ctrlc03/qfi-kmeans/blob/main/src/ts/k-means.ts#L361\"\u003eref\u003c/a\u003e)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe output can be later plotted using a plotting library such as \u003ccode\u003ematplotlib\u003c/code\u003e.\u003c/p\u003e\n\u003ch3 id=\"how-to-use-zk-snarks-to-verify-a-ballot-coefficient\"\u003eHow to use zk-SNARKs to verify a ballot coefficient\u003c/h3\u003e\n\u003cp\u003eAfter publishing the results of the round, users can verify that the coefficient assigned is correct by using a zk-SNARK circuit (in this case written using Circom).\u003c/p\u003e\n\u003cp\u003eThe circuit takes as input the user ballot, the centroids, and the index of the centroid to which it is assigned. Rather than computing the whole algorithm again, the circuit will calculate the distance of the ballot from each centroid, and confirm whether the resulting index matches the input index.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ek-means\u003c/strong\u003e\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-js\" data-lang=\"js\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003epragma\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ecircom\u003c/span\u003e \u003cspan style=\"color:#ae81ff\"\u003e2.1\u003c/span\u003e.\u003cspan style=\"color:#ae81ff\"\u003e0\u003c/span\u003e;\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003einclude\u003c/span\u003e \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;./distance.circom\u0026#34;\u003c/span\u003e;\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#75715e\"\u003e// template to verify k-means clustering\n\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003etemplate\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eKmeans\u003c/span\u003e(\u003cspan style=\"color:#a6e22e\"\u003ek\u003c/span\u003e, \u003cspan style=\"color:#a6e22e\"\u003eprojects\u003c/span\u003e) {\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#75715e\"\u003e// there should be at least two clusters\n\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003eassert\u003c/span\u003e(\u003cspan style=\"color:#a6e22e\"\u003ek\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e\u0026gt;\u003c/span\u003e \u003cspan style=\"color:#ae81ff\"\u003e1\u003c/span\u003e);\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#75715e\"\u003e// we should have more than one project\n\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003eassert\u003c/span\u003e(\u003cspan style=\"color:#a6e22e\"\u003eprojects\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e\u0026gt;\u003c/span\u003e \u003cspan style=\"color:#ae81ff\"\u003e1\u003c/span\u003e);\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#75715e\"\u003e// projects should be more than clusters\n\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003eassert\u003c/span\u003e(\u003cspan style=\"color:#a6e22e\"\u003eprojects\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e\u0026gt;\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ek\u003c/span\u003e);\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#75715e\"\u003e// the centroids of each cluster\n\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003esignal\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003einput\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ecentroids\u003c/span\u003e[\u003cspan style=\"color:#a6e22e\"\u003ek\u003c/span\u003e][\u003cspan style=\"color:#a6e22e\"\u003eprojects\u003c/span\u003e];\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#75715e\"\u003e// the user\u0026#39;s vote ballot\n\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003esignal\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003einput\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eballot\u003c/span\u003e[\u003cspan style=\"color:#a6e22e\"\u003eprojects\u003c/span\u003e];\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#75715e\"\u003e// which cluster the ballot is supposed to be in\n\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003esignal\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003einput\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eclusterIndex\u003c/span\u003e;\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#75715e\"\u003e// our output\n\u ex;\"\u003e\u003cspan\u003e\t\t\u003cspan style=\"color:#a6e22e\"\u003elessThan\u003c/span\u003e[\u003cspan style=\"color:#a6e22e\"\u003ei\u003c/span\u003e] \u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eLessThan\u003c/span\u003e(\u003cspan style=\"color:#ae81ff\"\u003e32\u003c/span\u003e);\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\t\t\u003cspan style=\"color:#a6e22e\"\u003elessThan\u003c/span\u003e[\u003cspan style=\"color:#a6e22e\"\u003ei\u003c/span\u003e].\u003cspan style=\"color:#66d9ef\"\u003ein\u003c/span\u003e[\u003cspan style=\"color:#ae81ff\"\u003e0\u003c/span\u003e] \u003cspan style=\"color:#f92672\"\u003e\u0026lt;==\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003evectors\u003c/span\u003e[\u003cspan style=\"color:#ae81ff\"\u003e0\u003c/span\u003e][\u003cspan style=\"color:#a6e22e\"\u003ei\u003c/span\u003e];\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\t\t\u003cspan style=\"color:#a6e22e\"\u003elessThan\u003c/span\u003e[\u003cspan style=\"color:#a6e22e\"\u003ei\u003c/span\u003e].\u003cspan style=\"color:#66d9ef\"\u003ein\u003c/span\u003e[\u003cspan style=\"color:#ae81ff\"\u003e1\u003c/span\u003e] \u003cspan style=\"color:#f92672\"\u003e\u0026lt;==\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003evectors\u003c/span\u003e[\u003cspan style=\"color:#ae81ff\"\u003e1\u003c/span\u003e][\u003cspan style=\"color:#a6e22e\"\u003ei\u003c/span\u003e];\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\t\t\u003cspan style=\"color:#75715e\"\u003e// calculate the difference between the two vectors\n\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\t\t\u003cspan style=\"color:#a6e22e\"\u003edifferences1\u003c/span\u003e[\u0 t\u003cspan style=\"color:#a6e22e\"\u003emutexesLess\u003c/span\u003e[\u003cspan style=\"color:#a6e22e\"\u003ei\u003c/span\u003e].\u003cspan style=\"color:#a6e22e\"\u003ec\u003c/span\u003e[\u003cspan style=\"color:#ae81ff\"\u003e0\u003c/span\u003e] \u003cspan style=\"color:#f92672\"\u003e\u0026lt;==\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003edifferences1\u003c/span\u003e[\u003cspan style=\"color:#a6e22e\"\u003ei\u003c/span\u003e];\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\t\t\u003cspan style=\"color:#a6e22e\"\u003emutexesLess\u003c/span\u003e[\u003cspan style=\"color:#a6e22e\"\u003ei\u003c/span\u003e].\u003cspan style=\"color:#a6e22e\"\u003ec\u003c/span\u003e[\u003cspan style=\"color:#ae81ff\"\u003e1\u003c/span\u003e] \u003cspan style=\"color:#f92672\"\u003e\u0026lt;==\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003edifferences2\u003c/span\u003e[\u003cspan style=\"color:#a6e22e\"\u003ei\u003c/span\u003e];\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\t\t\u003cspan style=\"color:#a6e22e\"\u003emutexesLess\u003c/span\u003e[\u003cspan style=\"color:#a6e22e\"\u003ei\u003c/span\u003e].\u003cspan style=\"color:#a6e22e\"\u003es\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e\u0026lt;==\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003elessThan\u003c/span\u003e[\u003cspan style=\"color:#a6e22e\"\u003ei\u003c/span\u003e].\u003cspan style=\"color:#a6e22e\"\u003eout\u003c/span\u003e;\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\t\t\u003cspan style=\"color:#75715e\"\u003e// if [0][i] \u0026lt; [1][i] -\u0026gt; output is 1 -\u0026gt; thus we want differences2[i] \n\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\t\t\u003cspan style=\"color:#75715e\"\u003e// which is [1][i] - [0][i]\n\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\t\t\u003cspan style=\"color:#75715e\"\u003e// if [0][i] \u0026gt;= [1][i] -\u0026gt; output is 0 -\u0026gt; thus we want differences1[i]\n\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\t\t\u003cspan style=\"color:#75715e\"\u003e// which is [0][i] - [1][i]\n\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\t\t\u003cspan style=\"color:#a6e22e\"\u003esquaredDifferences\u003c/span\u003e[\u003cspan style=\"color:#a6e22e\"\u003ei\u003c/span\u003e] \u003cspan style=\"color:#f92672\"\u003e\u0026lt;==\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003emutexesLess\u003c/span\u003e[\u003cspan style=\"color:#a6e22e\"\u003ei\u003c/span\u003e].\u003cspan style=\"color:#a6e22e\"\u003eout\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e*\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003emutexesLess\u003c/span\u003e[\u003cspan style=\"color:#a6e22e\"\u003ei\u003c/span\u003e].\u003cspan style=\"color:#a6e22e\"\u003eout\u003c/span\u003e;\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\t\t\u003cspan style=\"color:#75715e\"\u003e// add to the accumulator\n\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\t\t\u003cspan style=\"color:#a6e22e\"\u003eaccumulator\u003c/span\u003e[\u003cspan style=\"color:#a6e22e\"\u003ei\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e+\u003c/span\u003e \u003cspan style=\"color:#ae81ff\"\u003e1\u003c/span\u003e] \u003cspan style=\"color:#f92672\"\u003e\u0026lt;==\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eaccumulator\u003c/span\u003e[\u003cspan style=\"color:#a6e22e\"\u003ei\u003c/span\u003e] \u003cspan style=\"color:#f92672\"\u003e+\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003esquaredDifferences\u003c/span\u003e[\u003cspan style=\"color:#a6e22e\"\u003ei\u003c/span\u003e];\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\t}\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\t\u003cspan style=\"color:#75715e\"\u003e// Output the final sum is the value held in the last index \n\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\t\u003cspan style=\"color:#a6e22e\"\u003esumOfSquaredDistances\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e\u0026lt;==\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eaccumulator\u003c/span\u003e[\u003cspan style=\"color:#a6e22e\"\u003eprojects\u003c/span\u003e];\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e}\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003ch3 id=\"interesting-fact-about-circom\"\u003eInteresting fact about circom\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003eThanks to ChatGPT for the explaination btw.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eInitially I was using the prime value p as the initialIndex variable, thinking this would be the largest value that could be represented in Circom, and thus avoid any error with the calculation of the shortest distance. However, when comparing the distance between a ballot and a centroid with this number, the result was always that the distance was larger than the p number. In Circom this large prime number is \u003ccode\u003e21888242871839275222246405745257275088548364400416034343698204186575808495617\u003c/code\u003e.\u003c/p\u003e\n\u003cp\u003eWhen computing: \u003ccode\u003eif (distance \u0026lt; 21888242871839275222246405745257275088548364400416034343698204186575808495617)\u003c/code\u003e Circom would perform the operation in the finite field modulo \u003ccode\u003ep\u003c/code\u003e. This results in a different behaviour compared to regular integer arithmetic. Due to wrapping behaviour, large values close to \u003ccode\u003ep\u003c/code\u003e would be seen as small positive values, hence why Circom returning that \u003ccode\u003e21888242871839275222246405745257275088548364400416034343698204186575808495617\u003c/code\u003e was smaller than the calculated distance.\u003c/p\u003e\n\u003cp\u003eTherefore, I took an arbitrarly large number such as 2^64 as the initial minimum distance.\u003c/p\u003e\n\u003ch3 id=\"optimizing-the-circuit\"\u003eOptimizing the circuit\u003c/h3\u003e\n\u003cp\u003eIn circom, optimization means reducing the number of constraints - the result is less computational costs and quicker proving time. This can be achieved by reducing the number of intermediate signals. In our case, we can reduce the number of signals by reducing the amount of operations. The distance algorithm used in the original algorithm is the eucledian distance, thus for each vote in the ballot, we calculate the distance from the centroid by subtracting one point (weight) from the other and squaring the result. After, we sum all distances and calculate the square root.\u003c/p\u003e\n\u003cp\u003eLet\u0026rsquo;s look at the following example\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-ts\" data-lang=\"ts\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003eballot\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e [\u003cspan style=\"color:#ae81ff\"\u003e4\u003c/span\u003e, \u003cspan style=\"color:#ae81ff\"\u003e3\u003c/span\u003e]\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003ecentroid\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e [[\u003cspan style=\"color:#ae81ff\"\u003e5\u003c/span\u003e, \u003cspan style=\"color:#ae81ff\"\u003e7\u003c/span\u003e], [\u003cspan style=\"color:#ae81ff\"\u003e2\u003c/span\u003e, \u003cspan style=\"color:#ae81ff\"\u003e1\u003c/span\u003e]]\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003e\u003cstrong\u003eEucledian distance formula\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e$sqrt(sum[(b2-b1)^2, (c2-c1)^2), ..])$\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eBallot 1 Centroid 1 distance\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e$sqrt(sum[(5-4)^2, (7-3)^2)]) = sqrt(sum[(1)^2, (4)^2]) = sqrt(sum[1, 16]) = sqrt(17)$\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eBallot 1 Centroid 2 distance\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e$sqrt(sum[(2-4)^2, (1-3)^2]) = sqrt(sum[(-2)^2, (-2)^2]) = sqrt(sum[4, 4]) = sqrt(8)$\u003c/p\u003e\n\u003cp\u003eBallot 1 is closer to Centroid 2 as sqrt(8) \u0026lt; sqrt(17)\u003c/p\u003e\n\u003cp\u003eDue to the format of our data, we can simplify this in our circuits even more:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003edo not calculate the square root:\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e\u003cstrong\u003eFormula\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e$sum[(b2-b1)^2, (c2-c1)^2), ..]$\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eBallot 1 Centroid 1 distance\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e$sum[(5-4)^2, (7-3)^2)] = sum[(1)^2, (4)^2] = sum[1, 16] = 17$\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eBallot 1 Centroid 2 distance\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e$sum[(2-4)^2, (1-3)^2] = sum[(-2)^2, (-2)^2] = sum[4, 4] = 8$\u003c/p\u003e\n\u003cp\u003eBallot 1 closer to centroid 2 as 8 \u0026lt; 17\u003c/p\u003e\n\u003cp\u003eNow we can even remove the square of the differences and just ensure that we take the absolute value (manhattan distance) (in circom we subtract the lowest from the largest)\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eFormula\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e$sum[abs(b2-b1), abs(c2-c1), ..]$\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eBallot 1 Centroid 1 distance\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e$sum[abs(5-4), abs(7-3)] = sum[1, 4] = 5$\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eBallot 1 Centroid 2 distance\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e$sum[abs(2-4), abs(1-3)] = sum[2, 2] = 4$\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eBallot 1 closer to centroid 2 as 4 \u0026lt; 5\u003c/p\u003e\n\u003cp\u003eLet\u0026rsquo;s implement this in circom\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003ek-means\u003c/strong\u003e\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-js\" data-lang=\"js\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003epragma\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ecircom\u003c/span\u003e \u003cspan style=\"color:#ae81ff\"\u003e2.1\u003c/span\u003e.\u003cspan style=\"color:#ae81ff\"\u003e0\u003c/span\u003e;\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003einclude\u003c/span\u003e \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;./distance_manhattan.circom\u0026#34;\u003c/span\u003e;\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#75715e\"\u003e// template to verify k-means clustering\n\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003etemplate\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eKmeansManhattan\u003c/span\u003e(\u003cspan style=\"color:#a6e22e\"\u003ek\u003c/span\u003e, \u003cspan style=\"color:#a6e22e\"\u003eprojects\u003c/span\u003e) {\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#75715e\"\u003e// there should be at least two clusters\n\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003eassert\u003c/span\u003e(\u003cspan style=\"color:#a6e22e\"\u003ek\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e\u0026gt;\u003c/span\u003e \u003cspan style=\"color:#ae81ff\"\u003e1\u003c/span\u003e);\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#75715e\"\u003e// we should have more than one project\n\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003eassert\u003c/span\u003e(\u003cspan style=\"color:#a6e22e\"\u003eprojects\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e\u0026gt;\u003c/span\u003e \u003cspan style=\"color:#ae81ff\"\u003e1\u003c/span\u003e);\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#75715e\"\u003e// projects should be more than clusters\n\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003eassert\u003c/span\u003e(\u003cspan style=\"color:#a6e22e\"\u003eprojects\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e\u0026gt;\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ek\u003c/span\u003e);\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#75715e\"\u003e// the centroids of each cluster\n\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003esignal\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003einput\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ecentroids\u003c/span\u003e[\u003cspan style=\"color:#a6e22e\"\u003ek\u003c/span\u003e][\u003cspan style=\"color:#a6e22e\"\u003eprojects\u003c/span\u003e];\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#75715e\"\u003e// the user\u0026#39;s vote ballot\n\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003esignal\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003einput\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eballot\u003c/span\u003e[\u003cspan style=\"color:#a6e22e\"\u003eprojects\u003c/span\u003e];\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#75715e\"\u003e// which cluster the ballot is supposed to be in\n\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003esignal\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003einput\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eclusterIndex\u003c/span\u003e;\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#75715e\"\u003e// our output\n\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003esignal\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eoutput\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ematch\u003c/span\u003e;\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#66d9ef\"\u003evar\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eindex\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e \u003cspan style=\"color:#ae81ff\"\u003e0\u003c/span\u003e;\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#75715e\"\u003e// large number 2^64 = 18446744073709551616\n\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#66d9ef\"\u003evar\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003epreviousDistance\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e \u003cspan style=\"color:#ae81ff\"\u003e18446744073709551616\u003c/span\u003e;\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#75715e\"\u003e// our distance calculators\n\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003ecomponent\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ecalculateDistance\u003c/span\u003e[\u003cspan style=\"color:#a6e22e\"\u003ek\u003c/span\u003e];\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/ "\u003e1\u003c/span\u003e][\u003cspan style=\"color:#a6e22e\"\u003ei\u003c/span\u003e];\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\t\t\u003cspan style=\"color:#a6e22e\"\u003edifferences2\u003c/span\u003e[\u003cspan style=\"color:#a6e22e\"\u003ei\u003c/span\u003e] \u003cspan style=\"color:#f92672\"\u003e\u0026lt;==\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003evectors\u003c/span\u003e[\u003cspan style=\"color:#ae81ff\"\u003e1\u003c/span\u003e][\u003cspan style=\"color:#a6e22e\"\u003ei\u003c/span\u003e] \u003cspan style=\"color:#f92672\"\u003e-\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003evectors\u003c/span\u003e[\u003cspan style=\"color:#ae81ff\"\u003e0\u003c/span\u003e][\u003cspan style=\"color:#a6e22e\"\u003ei\u003c/span\u003e];\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\t\t\u003cspan style=\"color:#75715e\"\u003e// confirm the output of LessThan\n\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\t\t\u003cspan style=\"color:#a6e22e\"\u003emutexesLess\u003c/span\u003e[\u003cspan style=\"color:#a6e22e\"\u003ei\u003c/span\u003e] \u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eMux1\u003c/span\u003e();\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\t\t\u003cspan style=\"color:#a6e22e\"\u003emutexesLess\u003c/span\u003e[\u003cspan style=\"color:#a6e22e\"\u003ei\u003c/span\u003e].\u003cspan style=\"color:#a6e22e\"\u003ec\u003c/span\u003e[\u003cspan style=\"color:#ae81ff\"\u003e0\u003c/span\u003e] \u003cspan style=\"color:#f92672\"\u003e\u0026lt;==\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003edifferences1\u003c/span\u003e[\u003cspan style=\"color:#a6e22e\"\u003ei\u003c/span\u003e];\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\t\t\u003cspan style=\"color:#a6e22e\"\u003emutexesLess\u003c/span\u003e[\u003cspan style=\"color:#a6e22e\"\u003ei\u003c/span\u003e].\u003cspan style=\"color:#a6e22e\"\u003ec\u003c/span\u003e[\u003cspan style=\"color:#ae81ff\"\u003e1\u003c/span\u003e] \u003cspan style=\"color:#f92672\"\u003e\u0026lt;==\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003edifferences2\u003c/span\u003e[\u003cspan style=\"color:#a6e22e\"\u003ei\u003c/span\u003e];\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\t\t\u003cspan style=\"color:#a6e22e\"\u003emutexesLess\u003c/span\u003e[\u003cspan style=\"color:#a6e22e\"\u003ei\u003c/span\u003e].\u003cspan style=\"color:#a6e22e\"\u003es\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e\u0026lt;==\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003elessThan\u003c/span\u003e[\u003cspan style=\"color:#a6e22e\"\u003ei\u003c/span\u003e].\u003cspan style=\"color:#a6e22e\"\u003eout\u003c/span\u003e;\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\t\t\u003cspan style=\"color:#75715e\"\u003e// if [0][i] \u0026lt; [1][i] -\u0026gt; output is 1 -\u0026gt; thus we want differences2[i] \n\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\t\t\u003cspan style=\"color:#75715e\"\u003e// which is [1][i] - [0][i]\n\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\t\t\u003cspan style=\"color:#75715e\"\u003e// if [0][i] \u0026gt;= [1][i] -\u0026gt; output is 0 -\u0026gt; thus we want differences1[i]\n\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\t\t\u003cspan style=\"color:#75715e\"\u003e// which is [0][i] - [1][i]\n\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\t\t\u003cspan style=\"color:#75715e\"\u003e// add to the accumulator\n\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\t\t\u003cspan style=\"color:#a6e22e\"\u003eaccumulator\u003c/span\u003e[\u003cspan style=\"color:#a6e22e\"\u003ei\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e+\u003c/span\u003e \u003cspan style=\"color:#ae81ff\"\u003e1\u003c/span\u003e] \u003cspan style=\"color:#f92672\"\u003e\u0026lt;==\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eaccumulator\u003c/span\u003e[\u003cspan style=\"color:#a6e22e\"\u003ei\u003c/span\u003e] \u003cspan style=\"color:#f92672\"\u003e+\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003emutexesLess\u003c/span\u003e[\u003cspan style=\"color:#a6e22e\"\u003ei\u003c/span\u003e].\u003cspan style=\"color:#a6e22e\"\u003eout\u003c/span\u003e;\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\t}\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\t\u003cspan style=\"color:#75715e\"\u003e// Output the final sum is the value held in the last index \n\u003c/span\u003e\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\t\u003cspan style=\"color:#a6e22e\"\u003esumOfDistances\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e\u0026lt;==\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eaccumulator\u003c/span\u003e[\u003cspan style=\"color:#a6e22e\"\u003eprojects\u003c/span\u003e];\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e}\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003eWe can now calculate the number of constraints based on the same parameter set:\u003c/p\u003e\n\u003cp\u003ek = 5 and projects = 125\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003ecircuit1:\u003c/li\u003e\n\u003c/ul\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-bash\" data-lang=\"bash\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003ecircom --r1cs tests/circuits/k-means_test.circom\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003etemplate instances: \u003cspan style=\"color:#ae81ff\"\u003e6\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003enon-linear constraints: \u003cspan style=\"color:#ae81ff\"\u003e21875\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003elinear constraints: \u003cspan style=\"color:#ae81ff\"\u003e0\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003epublic inputs: \u003cspan style=\"color:#ae81ff\"\u003e0\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003epublic outputs: \u003cspan style=\"color:#ae81ff\"\u003e1\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003eprivate inputs: \u003cspan style=\"color:#ae81ff\"\u003e751\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003eprivate outputs: \u003cspan style=\"color:#ae81ff\"\u003e0\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003ewires: \u003cspan style=\"color:#ae81ff\"\u003e22502\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003elabels: \u003cspan style=\"color:#ae81ff\"\u003e32638\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cul\u003e\n\u003cli\u003ecircuit2:\u003c/li\u003e\n\u003c/ul\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-bash\" data-lang=\"bash\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003ecircom --r1cs tests/circuits/k-means_manhattan_test.circom\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003etemplate instances: \u003cspan style=\"color:#ae81ff\"\u003e6\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003enon-linear constraints: \u003cspan style=\"color:#ae81ff\"\u003e21250\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003elinear constraints: \u003cspan style=\"color:#ae81ff\"\u003e0\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003epublic inputs: \u003cspan style=\"color:#ae81ff\"\u003e0\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003epublic outputs: \u003cspan style=\"color:#ae81ff\"\u003e1\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003eprivate inputs: \u003cspan style=\"color:#ae81ff\"\u003e751\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003eprivate outputs: \u003cspan style=\"color:#ae81ff\"\u003e0\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003ewires: \u003cspan style=\"color:#ae81ff\"\u003e21877\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003elabels: \u003cspan style=\"color:#ae81ff\"\u003e32013\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003eWe can see that we have removed the number of constraints by 625 (21875-21250). This is k\u003cem\u003eprojects (5\u003c/em\u003e125). So for each project we add, we end up having k less constraints, or on the other hand, if we change k by 1, we end up having 125 (projects) constrains less.\u003c/p\u003e\n\u003cp\u003eLooking at the code, we removed the \u003ccode\u003esquaredDifferences\u003c/code\u003e signal which results in this optimization.\u003c/p\u003e\n\u003ch2 id=\"scaling-p0tion\"\u003eScaling p0tion\u003c/h2\u003e\n\u003cp\u003eOne of the current limitations of p0tion is that due to the specs of the Cloud Functions, which can run with up to 16gb ram, it was never possible to verify a contribution for a circuit with large parameter sizes.\u003c/p\u003e\n\u003cp\u003eTo solve this, we integrated the following AWS services:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eEC2 - to run and manage VMs\u003c/li\u003e\n\u003cli\u003eSSM - to execute commands remotely on the VM\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eWhen creating a ceremony, there can be one or more circuits, which can vary in constraints. For instance one circuit might not require much computing power to contribute to a zKey or to verify it, whereas another might require a very large amount of resources. With this new update, a coordinator can select a different type of VM for each circuit, which will be span up during the ceremony creation. Let\u0026rsquo;s say that we need a VM with 64gb ram and one with 16gb, now the coordinator will be able to select between a variety of options and a VM matching such resources will be created. To make the process even more efficient, during creation, each VM will download the required files by copying the powers of tau and genesis zKey to disk:\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-ts\" data-lang=\"ts\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e \u003cspan style=\"color:#66d9ef\"\u003econst\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ecommand\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e [\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;#!/bin/bash\u0026#34;\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;sudo yum update -y\u0026#34;\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;sudo yum install -y nodejs\u0026#34;\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;npm install -g snarkjs\u0026#34;\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#e6db74\"\u003e`aws s3 cp s3://\u003c/span\u003e\u003cspan style=\"color:#e6db74\"\u003e${\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003ezKeyPath\u003c/span\u003e\u003cspan style=\"color:#e6db74\"\u003e}\u003c/span\u003e\u003cspan style=\"color:#e6db74\"\u003e /var/tmp/genesisZkey.zkey`\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#e6db74\"\u003e`aws s3 cp s3://\u003c/span\u003e\u003cspan style=\"color:#e6db74\"\u003e${\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003eptauPath\u003c/span\u003e\u003cspan style=\"color:#e6db74\"\u003e}\u003c/span\u003e\u003cspan style=\"color:#e6db74\"\u003e /var/tmp/pot.ptau`\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e]\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003eThe contribution steps have not changed, however, the \u003ccode\u003everifyContribution\u003c/code\u003e cloud function will now pass the execution to the VM associated with the circuit for whose zKey we are verifying.\u003c/p\u003e\n\u003cp\u003eIn a nutshell the function does the following:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eperform checks to ensure that the user calling the function is authorized to do so\u003c/li\u003e\n\u003cli\u003efetch the required circuit and ceremony data\u003c/li\u003e\n\u003cli\u003estart the VM associated with the circuit\u003c/li\u003e\n\u003cli\u003ewait till the VM is up and running\u003c/li\u003e\n\u003cli\u003euse SSM to execute the following commands on the VM:\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-ts\" data-lang=\"ts\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e \u003cspan style=\"color:#e6db74\"\u003e`aws s3 cp s3://\u003c/span\u003e\u003cspan style=\"color:#e6db74\"\u003e${\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003ebucketName\u003c/span\u003e\u003cspan style=\"color:#e6db74\"\u003e}\u003c/span\u003e\u003cspan style=\"color:#e6db74\"\u003e/\u003c/span\u003e\u003cspan style=\"color:#e6db74\"\u003e${\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003elastZkeyStoragePath\u003c/span\u003e\u003cspan style=\"color:#e6db74\"\u003e}\u003c/span\u003e\u003cspan style=\"color:#e6db74\"\u003e /var/tmp/lastZKey.zkey`\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e \u003cspan style=\"color:#e6db74\"\u003e`snarkjs zkvi /var/tmp/genesisZkey.zkey /var/tmp/pot.ptau /var/tmp/lastZKey.zkey | tee /var/tmp/verification_transcript.log`\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e \u003cspan style=\"color:#e6db74\"\u003e`aws s3 cp /var/tmp/verification_transcript.log s3://\u003c/span\u003e\u003cspan style=\"color:#e6db74\"\u003e${\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003ebucketName\u003c/span\u003e\u003cspan style=\"color:#e6db74\"\u003e}\u003c/span\u003e\u003cspan style=\"color:#e6db74\"\u003e/\u003c/span\u003e\u003cspan style=\"color:#e6db74\"\u003e${\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003everificationTranscriptStoragePathAndFilename\u003c/span\u003e\u003cspan style=\"color:#e6db74\"\u003e}\u003c/span\u003e\u003cspan style=\"color:#e6db74\"\u003e`\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e \u003cspan style=\"color:#e6db74\"\u003e`rm /var/tmp/lastZKey.zkey /var/tmp/verification_transcript.log`\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cul\u003e\n\u003cli\u003edownload the last zKey\u003c/li\u003e\n\u003cli\u003everify using snarkjs\u003c/li\u003e\n\u003cli\u003eupload the transcript to s3\u003c/li\u003e\n\u003cli\u003ecleanup\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003cli\u003eretrieve the output of the command using SSM\u003c/li\u003e\n\u003cli\u003eif the \u003ccode\u003eZKey Ok!\u003c/code\u003e string is in the output, then the zKey was valid, otherwise no\u003c/li\u003e\n\u003cli\u003estop the VM\u003c/li\u003e\n\u003cli\u003econtinue with storing the data to firebase\u003c/li\u003e\n\u003c/ol\u003e\n\u003ch3 id=\"lets-talk-devops\"\u003eLet\u0026rsquo;s talk DevOps\u003c/h3\u003e\n\u003cp\u003eIn order to use AWS VMs to verify a contribution we need to setup the correct IAM roles/permissions. We also want to follow the principle of least privilege and ensure that other resources in the AWS account are not at risk due to these new permissions.\u003c/p\u003e\n\u003cp\u003eTherefore, I divided the policies into a general policy for the IAM user spinning up S3 buckets and EC2 instances, and 2 special policies for privileged functions on both S3 and EC2 - each with a condition of the Name tag of the resource to equal a particular string. Unfortunately it is not possible to use a resource based condition on the bucket tag itself, only the objects. However, this works fine for EC2 instances. Surely terminating an instance is much more dangerous, and for other buckets we can set an inline policy to prevent deletion by anyone but the bucket owner.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eGeneral policy\u003c/strong\u003e\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-json\" data-lang=\"json\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e{\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#f92672\"\u003e\u0026#34;Version\u0026#34;\u003c/span\u003e: \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;2012-10-17\u0026#34;\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#f92672\"\u003e\u0026#34;Statement\u0026#34;\u003c/span\u003e: [\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        {\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e            \u003cspan style=\"color:#f92672\"\u003e\u0026#34;Sid\u0026#34;\u003c/span\u003e: \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;S3andEC2andSSM\u0026#34;\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e            \u003cspan style=\"color:#f92672\"\u003e\u0026#34;Effect\u0026#34;\u003c/span\u003e: \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;Allow\u0026#34;\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e            \u003cspan style=\"color:#f92672\"\u003e\u0026#34;Action\u0026#34;\u003c/span\u003e: [\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e                \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;s3:CreateBucket\u0026#34;\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e                \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;s3:ListBucket\u0026#34;\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e                \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;s3:ListMultipartUploadParts\u0026#34;\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e                \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;s3:GetObject\u0026#34;\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e                \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;s3:AbortMultipartUpload\u0026#34;\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e                \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;s3:GetObjectVersion\u0026#34;\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e                \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;s3:GetBucketTagging\u0026#34;\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e                \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;ec2:RunInstances\u0026#34;\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e                \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;ec2:DescribeInstanceStatus\u0026#34;\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e                \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;iam:PassRole\u0026#34;\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e            ],\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e            \u003cspan style=\"color:#f92672\"\u003e\u0026#34;Resource\u0026#34;\u003c/span\u003e: \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;*\u0026#34;\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        }\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    ]\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e}\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003e\u003cstrong\u003eS3 privileged access\u003c/strong\u003e\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-json\" data-lang=\"json\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e{\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#f92672\"\u003e\u0026#34;Version\u0026#34;\u003c/span\u003e: \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;2012-10-17\u0026#34;\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#f92672\"\u003e\u0026#34;Statement\u0026#34;\u003c/span\u003e: [\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        {\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e            \u003cspan style=\"color:#f92672\"\u003e\u0026#34;Sid\u0026#34;\u003c/span\u003e: \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;S3Privileged\u0026#34;\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e            \u003cspan style=\"color:#f92672\"\u003e\u0026#34;Effect\u0026#34;\u003c/span\u003e: \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;Allow\u0026#34;\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e            \u003cspan style=\"color:#f92672\"\u003e\u0026#34;Action\u0026#34;\u003c/span\u003e: [\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e                \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;s3:DeleteObject\u0026#34;\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e                \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;s3:DeleteBucket\u0026#34;\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e                \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;s3:PutBucketPublicAccessBlock\u0026#34;\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e                \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;s3:PutBucketCORS\u0026#34;\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e                \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;s3:PutBucketObjectLockConfigura 272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-json\" data-lang=\"json\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e{\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#f92672\"\u003e\u0026#34;Version\u0026#34;\u003c/span\u003e: \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;2012-10-17\u0026#34;\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#f92672\"\u003e\u0026#34;Statement\u0026#34;\u003c/span\u003e: [\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        {\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e            \u003cspan style=\"color:#f92672\"\u003e\u0026#34;Sid\u0026#34;\u003c/span\u003e: \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;EC2Privileged\u0026#34;\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e            \u003cspan style=\"color:#f92672\"\u003e\u0026#34;Effect\u0026#34;\u003c/span\u003e: \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;Allow\u0026#34;\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e            \u003cspan style=\"color:#f92672\"\u003e\u0026#34;Action\u0026#34;\u003c/span\u003e: [\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e                \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;ec2:StopInstances\u0026#34;\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e                \u003cspan style=\"color:#e6db74\"\u003e\u0026#34;ec2:TerminateInstances\u0026#34;\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e
