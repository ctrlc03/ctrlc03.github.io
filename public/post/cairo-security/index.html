 nile send PK1 storage_example register_move \u003cspan style=\"color:#ae81ff\"\u003e10\u003c/span\u003e \u003cspan style=\"color:#ae81ff\"\u003e15\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003eCalling register_move on storage_example with params: \u003cspan style=\"color:#f92672\"\u003e[\u003c/span\u003e\u003cspan style=\"color:#e6db74\"\u003e\u0026#39;10\u0026#39;\u003c/span\u003e, \u003cspan style=\"color:#e6db74\"\u003e\u0026#39;15\u0026#39;\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e]\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003eInvoke transaction was sent.\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003eContract address: 0x01be5e81e5cf897169c2bddcd4e44ae679f6110752fa305ac6066ac4f502d653\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003eTransaction hash: 0x50e9d2c08407a6b0a99edd8b6a0473388496e57730a8dbcd067263f9e6d0771\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003ectrlc3@ubuntu:~/Desktop/cairo-security/contracts$ nile debug 0x50e9d2c08407a6b0a99edd8b6a0473388496e57730a8dbcd067263f9e6d0771\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e⏳ Querying the network to check transaction status and identify contracts...\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e🧾 Found contracts: \u003cspan style=\"color:#f92672\"\u003e[\u003c/span\u003e\u003cspan style=\"color:#e6db74\"\u003e\u0026#39;0x047122f5407b9e9a9c337efc43dfee5b34b172dd0b6482addb190449e254f549:artifacts/storage_example.json\u0026#39;\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e]\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e⏳ Querying the network with identified contracts...\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e🧾 Error message:\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#f92672\"\u003e[\u003c/span\u003e...\u003cspan style=\"color:#f92672\"\u003e]\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003eError in the called contract \u003cspan style=\"color:#f92672\"\u003e(\u003c/span\u003e0x47122f5407b9e9a9c337efc43dfee5b34b172dd0b6482addb190449e254f549\u003cspan style=\"color:#f92672\"\u003e)\u003c/span\u003e:\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003eError message: This is not your previous move\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003estorage_example.cairo:48:17: storage_example.cairo:48:17: Error at pc\u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e0:200:\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e                assert 1 \u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e \u003cspan style=\"color:#ae81ff\"\u003e0\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e                ^**********^\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003eAn ASSERT_EQ instruction failed: \u003cspan style=\"color:#ae81ff\"\u003e0\u003c/span\u003e !\u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e 1.\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003eCairo traceback \u003cspan style=\"color:#f92672\"\u003e(\u003c/span\u003emost recent call last\u003cspan style=\"color:#f92672\"\u003e)\u003c/span\u003e:\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003estorage_example.cairo:31:6: \u003cspan style=\"color:#f92672\"\u003e(\u003c/span\u003epc\u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e0:226\u003cspan style=\"color:#f92672\"\u003e)\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003eBut, wait a second.. If you pass the plain text parameter in the function call, people can still see it.\u003c/p\u003e\n\u003cp\u003eGiven a tx hash, people can see the parameters passed using this \u003ca href=\"https://alpha4.starknet.io/feeder_gateway/get_transaction?transactionHash=\"\u003eendpoint\u003c/a\u003e + the transaction hash they want information for, so all of this would not work. So for now, do not store anything sensitive on StarkNet, and if for some reason you have to, make sure you encrypt it first.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eIt would be nice to hear from game-devs how they are doing things here?\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 id=\"type-safety\"\u003eType Safety\u003c/h2\u003e\n\u003ch3 id=\"uint256-checks\"\u003eUint256 checks\u003c/h3\u003e\n\u003cp\u003eAs mentioned previously, \u003ccode\u003eUint256\u003c/code\u003e are actually made up of two \u003ccode\u003efelt\u003c/code\u003e which can (well, should) contain up to 128 bits each. This means that an attacker has control of both the upper and lower portions of the \u003ccode\u003eUint256\u003c/code\u003e.\u003c/p\u003e\n\u003cp\u003eWhen performing validation of the contents, in say a balance update, it would be natural and efficient to only validate the relevant split of the integer. However, this opens a vector for attackers to manipulate contract logic for their own gain.\u003c/p\u003e\n\u003cp\u003eA couple of examples of these vectors in the wild are shown in this \u003ca href=\"https://chainsecurity.com/wp-content/uploads/2021/12/ChainSecurity_MakerDAO_StarkNet-DAI-Bridge_audit.pdf\"\u003ereport\u003c/a\u003e by ChainSecurity, for the \u003ccode\u003eUnlimited Approvals and the Range of Uint256\u003c/code\u003e and \u003ccode\u003eL2 DAI Allows Stealing\u003c/code\u003e findings.\u003c/p\u003e\n\u003cp\u003eIn your code, you should verify that \u003ccode\u003eUint256\u003c/code\u003e arguments are actually valid \u003ccode\u003eUint256\u003c/code\u003e. For this, you can use \u003ccode\u003euint256_check\u003c/code\u003e from \u003ca href=\"https://github.com/starkware-libs/cairo-lang/blob/master/src/starkware/cairo/common/uint256.cairo\"\u003eCairo standard library\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eMoving to a practical example, we are borrowing the \u003ccode\u003eAuction\u003c/code\u003e challenge from 2022\u0026rsquo;s Paradigm CTF. The goal of the challenge is to outbid the highest bid, which would require the user\u0026rsquo;s account to bid all of his token balance times 2 + 1. Given that the ERC20 contract has not been modified, this would either require us to find a zero-day in the ERC20 contract or exploit a vulnerability in the auction contract.\u003c/p\u003e\n\u003cp\u003eLet\u0026rsquo;s take a look at the \u003ccode\u003eraise_bid\u003c/code\u003e function below:\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-javascript\" data-lang=\"javascript\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#960050;background-color:#1e0010\"\u003e@\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003eexternal\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003efunc\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eraise_bid\u003c/span\u003e{\u003cspan style=\"color:#a6e22e\"\u003esyscall_ptr\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e*\u003c/span\u003e, \u003cspan style=\"color:#a6e22e\"\u003epedersen_ptr\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eHashBuiltin\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e*\u003c/span\u003e, \u003cspan style=\"color:#a6e22e\"\u003erange_check_ptr\u003c/span\u003e}(\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003eauction_id\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e, \u003cspan style=\"color:#a6e22e\"\u003eamount\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eUint256\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e)\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003ealloc_locals\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003eonly_open_auction\u003c/span\u003e(\u003cspan style=\"color:#a6e22e\"\u003eauction_id\u003c/span\u003e)\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#66d9ef\"\u003elet\u003c/span\u003e (\u003cspan style=\"color:#a6e22e\"\u003ecaller\u003c/span\u003e) \u003cspan style=\"color:#f 2\"\u003e=\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003epedersen_ptr\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003etempvar\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003erange_check_ptr\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003erange_check_ptr\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#66d9ef\"\u003eelse\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003etempvar\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003esyscall_ptr\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003esyscall_ptr\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003etempvar\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003epedersen_ptr\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003epedersen_ptr\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003etempvar\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003erange_check_ptr\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003erange_check_ptr\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003eend\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#66d9ef\"\u003ereturn\u003c/span\u003e ()\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003eend\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003eWe can see that the function accepts an \u003ccode\u003eauction_id\u003c/code\u003e and an \u003ccode\u003eamount\u003c/code\u003e parameters. The \u003ccode\u003eauction_id\u003c/code\u003e is verified to be of a running auction, and will revert if not. The function that deals with validating the auction is safe, so we are going to be focusing on the only other parameter we can play with, the \u003ccode\u003eamount\u003c/code\u003e.\u003c/p\u003e\n\u003cp\u003eAfter verifying that we are trying to interact with an open auction, the contract will then pull the stored balance of the user (which can be increased by depositing tokens via the \u003ccode\u003eincrease_credit\u003c/code\u003e function) as well as the locked balance (locked being the balance that one user added as bid). It will then calculate the unlocked balance which is equal to the \u003ccode\u003ebalance - locked balance\u003c/code\u003e. In this case, it will be zero as we have not deposited any tokens in the contract. After, it will compare the passed \u003ccode\u003eamount\u003c/code\u003e value with the unlocked balance using \u003ccode\u003euint256_le\u003c/code\u003e.\u003c/p\u003e\n\u003cp\u003eIf we pass a \u0026ldquo;malformed\u0026rdquo; \u003ccode\u003eUint256\u003c/code\u003e to the contract, this check will pass and will let us become the highest bidder without having to deposit any tokens.\u003c/p\u003e\n\u003cp\u003eThe \u003ccode\u003eUint256\u003c/code\u003e which can be passed to the contract is the following:\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-json\" data-lang=\"json\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e{\u003cspan style=\"color:#f92672\"\u003e\u0026#34;high\u0026#34;\u003c/span\u003e: \u003cspan style=\"color:#ae81ff\"\u003e0\u003c/span\u003e, \u003cspan style=\"color:#f92672\"\u003e\u0026#34;low\u0026#34;\u003c/span\u003e:\u003cspan style=\"color:#ae81ff\"\u003e2\u003c/span\u003e \u003cspan style=\"color:#960050;background-color:#1e0010\"\u003e**\u003c/span\u003e \u003cspan style=\"color:#ae81ff\"\u003e128\u003c/span\u003e \u003cspan style=\"color:#960050;background-color:#1e0010\"\u003e+\u003c/span\u003e \u003cspan style=\"color:#ae81ff\"\u003e1\u003c/span\u003e}\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003eIf you remember from the first sections, a \u003ccode\u003eUint256\u003c/code\u003e is made of two felt of up to 128 bits:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003elow\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ehigh\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eHowever, a \u003ccode\u003efelt\u003c/code\u003e can contain more than 128 bits, therefore we can use this to bypass the check, more specifically because there are no checks in place to prevent us from passing a non valid \u003ccode\u003eUint256\u003c/code\u003e value.\u003c/p\u003e\n\u003cp\u003eLet\u0026rsquo;s have a look at a more simple example where we can actually see what\u0026rsquo;s going on:\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-javascript\" data-lang=\"javascript\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#960050;background-color:#1e0010\"\u003e@\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003eview\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003efunc\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003euint256_test\u003c/span\u003e{\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003esyscall_ptr\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e*\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003epedersen_ptr\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eHashBuiltin\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e*\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003erange_check_ptr\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    } (\u003cspan style=\"color:#a6e22e\"\u003enum\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eUint256\u003c/span\u003e) \u003cspan style=\"color:#f92672\"\u003e-\u0026gt;\u003c/span\u003e (\u003cspan style=\"color:#a6e22e\"\u003eres\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e)\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#66d9ef\"\u003elet\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ezero\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eUint256\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eUint256\u003c/span\u003e(\u003cspan style=\"color:#ae81ff\"\u003e0\u003c/span\u003e, \u003cspan style=\"color:#ae81ff\"\u003e0\u003c/span\u003e)\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#66d9ef\"\u003elet\u003c/span\u003e (\u003cspan style=\"color:#a6e22e\"\u003echeck\u003c/span\u003e) \u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003euint256_le\u003c/span\u003e(\u003cspan style=\"color:#a6e22e\"\u003enum\u003c/span\u003e, \u003cspan style=\"color:#a6e22e\"\u003ezero\u003c/span\u003e)\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#66d9ef\"\u003ereturn\u003c/span\u003e (\u003cspan style=\"color:#a6e22e\"\u003echeck\u003c/span\u003e)\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003eend\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003eThis function simply accepts one \u003ccode\u003eUint256\u003c/code\u003e value and compares it with zero to check if it\u0026rsquo;s less or equal. Now, we pass the \u003ccode\u003eUint256\u003c/code\u003e representation of one (\u003ccode\u003e1 0\u003c/code\u003e):\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-bash\" data-lang=\"bash\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003estarknet call --address 0x018bbff3ce2473f7e779fbc2442cc5f0a5617789250862cba0512e2df304f70b --abi artifacts/abis/contract.json --function uint256_test --inputs \u003cspan style=\"color:#ae81ff\"\u003e1\u003c/span\u003e \u003cspan style=\"color:#ae81ff\"\u003e0\u003c/span\u003e --no_wallet --feeder_gateway\u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003ehttp://127.0.0.1:5050\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#ae81ff\"\u003e0\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003e\u003ccode\u003euint256_is_le\u003c/code\u003e returns zero which means that 1 is not less or equal to 0 (sanity check here).\u003c/p\u003e\n\u003cp\u003eNow, we try with a \u0026ldquo;malformed\u0026rdquo; \u003ccode\u003eUint256\u003c/code\u003e which is the next digit up of what an \u003ccode\u003eUint256\u003c/code\u003e low or high should contain:\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-bash\" data-lang=\"bash\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003estarknet call --address 0x018bbff3ce2473f7e779fbc2442cc5f0a5617789250862cba0512e2df304f70b --abi artifacts/abis/contract.json --function uint256_test --inputs \u003cspan style=\"color:#ae81ff\"\u003e0\u003c/span\u003e \u003cspan style=\"color:#ae81ff\"\u003e340282366920938463463374607431768211457\u003c/span\u003e --no_wallet --feeder_gateway\u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003ehttp://127.0.0.1:5050\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#ae81ff\"\u003e1\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003eAnd here we get 1, which means that \u003ccode\u003e(0, 340282366920938463463374607431768211457)\u003c/code\u003e passed the check. To understand why this happens we need to look at the functions involved in this:\u003c/p\u003e\n\u003cp\u003e\u003cem\u003euint256_le\u003c/em\u003e\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-javascript\" data-lang=\"javascript\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#960050;background-color:#1e0010\"\u003e#\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eReturns\u003c/span\u003e \u003cspan style=\"color:#ae81ff\"\u003e1\u003c/span\u003e \u003cspan style=\"color:#66d9ef\"\u003eif\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ethe\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efirst\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eunsigned\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003einteger\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eis\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eless\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ethan\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eor\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eequal\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eto\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ethe\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003esecond\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eunsigned\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003einteger\u003c/span\u003e.\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003efunc\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003euint256_le\u003c/span\u003e{\u003cspan style=\"color:#a6e22e\"\u003erange_check_ptr\u003c/span\u003e}(\u003cspan style=\"color:#a6e22e\"\u003ea\u span\u003e.\u003cspan style=\"color:#a6e22e\"\u003ehigh\u003c/span\u003e)\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003eend\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003e\u003cem\u003eis_le\u003c/em\u003e\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-javascript\" data-lang=\"javascript\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#960050;background-color:#1e0010\"\u003e#\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eReturns\u003c/span\u003e \u003cspan style=\"color:#ae81ff\"\u003e1\u003c/span\u003e \u003cspan style=\"color:#66d9ef\"\u003eif\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ea\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e\u0026lt;=\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eb\u003c/span\u003e (\u003cspan style=\"color:#a6e22e\"\u003eor\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003emore\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eprecisely\u003c/span\u003e \u003cspan style=\"color:#ae81ff\"\u003e0\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e\u0026lt;=\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eb\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e-\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003ea\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e\u0026lt;\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eRANGE_CHECK_BOUND\u003c/span\u003e).\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#960050;background-color:#1e0010\"\u003e#\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eReturns
