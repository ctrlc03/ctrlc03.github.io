\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003eamount\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eUint256\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003ereceiver\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003etoken\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    )\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#66d9ef\"\u003elet\u003c/span\u003e (\u003cspan style=\"color:#a6e22e\"\u003esender\u003c/span\u003e) \u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eget_caller_address\u003c/span\u003e()\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#66d9ef\"\u003elet\u003c/span\u003e (\u003cspan style=\"color:#a6e22e\"\u003ebalance_before\u003c/span\u003e) \u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eIERC20\u003c/span\u003e.\u003cspan style=\"color:#a6e22e\"\u003ebalanceOf\u003c/span\u003e(\u003cspan style=\"color:#a6e22e\"\u003econtract_address\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003etoken\u003c/span\u003e, \u003cspan style=\"color:#a6e22e\"\u003eaccount\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003ereceiver\u003c/span\u003e)\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003eIERC20\u003c/span\u003e.\u003cspan style=\"color:#a6e22e\"\u003etransferFrom\u003c/span\u003e(\u003cspan style=\"color:#a6e22e\"\u003econtract_address\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003etoken\u003c/span\u003e, \u003cspan style=\"color:#a6e22e\"\u003esender\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003esender\u003c/span\u003e, \u003cspan style=\"color:#a6e22e\"\u003erecipient\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003ereceiver\u003c/span\u003e, \u003cspan style=\"color:#a6e22e\"\u003eamount\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003eamount\u003c/span\u003e)\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#66d9ef\"\u003elet\u003c/span\u003e (\u003cspan style=\"color:#a6e22e\"\u003ebalance_after\u003c/span\u003e) \u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eIERC20\u003c/span\u003e.\u003cspan style=\"color:#a6e22e\"\u003ebalanceOf\u003c/span\u003e(\u003cspan style=\"color:#a6e22e\"\u003econtract_address\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003etoken\u003c/span\u003e, \u003cspan style=\"color:#a6e22e\"\u003eaccount\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003ereceiver\u003c/span\u003e)\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#66d9ef\"\u003elet\u003c/span\u003e (\u003cspan style=\"color:#a6e22e\"\u003ecalculated_balance\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eUint256\u003c/span\u003e) \u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eSafeUint256\u003c/span\u003e.\u003cspan style=\"color:#a6e22e\"\u003eadd\u003c/span\u003e(\u003cspan style=\"color:#a6e22e\"\u003ebalance_before\u003c/span\u003e, \u003cspan style=\"color:#a6e22e\"\u003eamount\u003c/span\u003e)\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#66d9ef\"\u003elet\u003c/span\u003e (\u003cspan style=\"color:#a6e22e\"\u003eis_equal\u003c/span\u003e) \u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003euint256_eq\u003c/span\u003e(\u003cspan style=\"color:#a6e22e\"\u003ebalance_after\u003c/span\u003e, \u003cspan style=\"color:#a6e22e\"\u003ecalculated_balance\u003c/span\u003e)\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003ewith_attr\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eerror_message\u003c/span\u003e(\u003cspan style=\"color:#e6db74\"\u003e\u0026#34;The balance is not correct\u0026#34;\u003c/span\u003e)\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003eassert\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eis_equal\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e \u003cspan style=\"color:#ae81ff\"\u003e1\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003eend\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#66d9ef\"\u003ereturn\u003c/span\u003e ()\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003eend\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003eWhat we do above, is to get the balance before the transfer and store it in a variable. Then we proceed with the transfer, and check the balance again.\nFinally, we revert if the previous balance + the amount transferred is not equal to the new balance.\u003c/p\u003e\n\u003cp\u003eA token doesn\u0026rsquo;t have to be malicious for this to apply, we\u0026rsquo;ve seen in the past that certain tokens charge a fee on transfer (which might or might not go towards the liquidity pool, but that\u0026rsquo;s another story), protocols should consider whether to allow these types of tokens to be used in their protocol. When in doubt, always implement the checks described above to be on the safe side.\u003c/p\u003e\n\u003ch2 id=\"missing-zero-address-checks\"\u003eMissing Zero Address Checks\u003c/h2\u003e\n\u003cp\u003eIn StarkNet, you can send transactions without using a contract account. The syscall \u003ccode\u003eget_caller_adress\u003c/code\u003e will always return zero in that case.\u003c/p\u003e\n\u003cp\u003eImagine you were able to transfer tokens to the address zero by mistake (OZ libraries prevent that actually but this is an example), now someone could directly call the contract and steal those funds.\u003c/p\u003e\n\u003cp\u003eTo mitigate this vector it is possible to use the \u003ccode\u003eassert_not_zero\u003c/code\u003e function from the \u003ca href=\"https://github.com/starkware-libs/cairo-lang/blob/master/src/starkware/cairo/common/math.cairo\"\u003eCairo math lib\u003c/a\u003e. This will ensure that the address is not zero\u0026rsquo;d by mistake or design.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003ePlease note that this will likely not be a problem anymore as mandatory fees are fully introduced, as it will not be possible to directly call a contract.\u003c/p\u003e\n\u003cp\u003eWe would still recommend exercising caution especially with addresses, and making sure that transferring ownership to the address zero (unless of course someone is renouncing ownership of a contract) should be prevented.\u003c/p\u003e\n\u003cp\u003eHere on the OZ cairo contract \u003ca href=\"https://github.com/OpenZeppelin/cairo-contracts/issues/148\"\u003erepo\u003c/a\u003e there is a short discussion of the matter, related to an issue that was identified in their \u003ccode\u003eERC721\u003c/code\u003e contract just before release of the first version of \u003ccode\u003ecairo-contracts\u003c/code\u003e.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 id=\"missing-zero-value-checks\"\u003eMissing Zero Value Checks\u003c/h2\u003e\n\u003cp\u003eSimilar to the attack vector described above, it is important to check that non-address values are also not zero. While addresses are always of type \u003ccode\u003efelt\u003c/code\u003e, we will include \u003ccode\u003eUint256\u003c/code\u003e values too.\u003c/p\u003e\n\u003cp\u003eIn order to prevent values from being zero, we can use the \u003ccode\u003eassert_not_zero\u003c/code\u003e function from the library mentioned above on \u003ccode\u003efelt\u003c/code\u003e values. Additionally, you can use it on the \u003ccode\u003e.low\u003c/code\u003e and/or \u003ccode\u003e.high\u003c/code\u003e part of a Uint256 (which are a felt as we discussed in sections above).\u003c/p\u003e\n\u003cp\u003eThere are other libraries to compare values that can also be used, such as the ones found in StarkNet\u0026rsquo;s \u003ccode\u003emath_cmp\u003c/code\u003e library.\u003c/p\u003e\n\u003cp\u003eWhat is important here, is that values are always within an acceptable boundary, this way we can mitigate both malicious and benign mistakes.\nOf course, there will be cases where allowing zero (or any value) is appropriate, such as a lending protocol where admin can set the fees, or allowing arbitrary fees that (based on some extra logic) would result in a pool being disabled. As such, developer discretion should be used when handling zero values.\u003c/p\u003e\n\u003ch2 id=\"toolchain-and-best-practices\"\u003eToolchain and Best Practices\u003c/h2\u003e\n\u003ch3 id=\"use-standard-andor-reputable-and-tested-libraries\"\u003eUse standard and/or reputable and tested libraries\u003c/h3\u003e\n\u003cp\u003eWhile the ecosystem is relatively new and there are certain libraries still missing, it is recommended to use standard and tested libraries for everything.\u003c/p\u003e\n\u003cp\u003ePlease refer to the official \u003ca href=\"https://github.com/starkware-libs/cairo-lang\"\u003eCairo repo\u003c/a\u003e and \u003ca href=\"https://github.com/OpenZeppelin/cairo-contracts\"\u003eOpenZeppelin’s cairo-contracts\u003c/a\u003e, as well as other reputable libraries that you can find on \u003ca href=\"https://github.com/beautyisourbusiness/cairo-goldmine\"\u003eCairo Goldmine\u003c/a\u003e.\u003c/p\u003e\n\u003ch3 id=\"use-up-to-date-cairo-versions\"\u003eUse up-to-date Cairo versions\u003c/h3\u003e\n\u003cp\u003eCairo is changing very quickly and therefore it is important to keep up to date with latest developments and ensure that code is developed and deployed using the latest and most stable versions of the Cairo programming language. This should also apply to the toolchain used by developers in their day to day operations. Also, in terms of functionality, it is likely that a new version will introduce just that one feature you thought Cairo was missing.\u003c/p\u003e\n\u003cp\u003eAlso, keep an eye out for security fixes in the changelog of your used libraries.\u003c/p\u003e\n\u003ch2 id=\"upgradable-contracts\"\u003eUpgradable Contracts\u003c/h2\u003e\n\u003cp\u003eHow do you make contracts upgreadable? Well thanks to OpenZeppelin libraries and StarkNet\u0026rsquo;s design, it is possible to implement these in a simple way.\u003c/p\u003e\n\u003cp\u003ePlease refer to their \u003ca href=\"https://docs.openzeppelin.com/contracts-cairo/0.3.1/proxies\"\u003eguide\u003c/a\u003e for the official explanation. In terms of security, what we want to make sure is that our implementation contracts are initialized by the contract developers, and that sensitive functions (such as \u003ccode\u003eupgrade\u003c/code\u003e) are protected by access control.\u003c/p\u003e\n\u003cp\u003eLet\u0026rsquo;s look at an example (one that works correctly).\u003c/p\u003e\n\u003cp\u003eHere is the default Proxy preset provided by \u003ca href=\"https://github.com/OpenZeppelin/cairo-contracts/blob/main/src/openzeppelin/upgrades/presets/Proxy.cairo\"\u003eOZ\u003c/a\u003e. This is very simple, has the \u003ccode\u003e__default__\u003c/code\u003e function (which is like our fallback in Solidity), a L1 handler, and a constructor.\nBefore deploying this contract, developers should make sure to declare the contract class of their implementation contract.\nAfter, they can deploy the Proxy contract and pass the \u003ccode\u003eimplementation_hash\u003c/code\u003e as parameter.\u003c/p\u003e\n\u003cp\u003eThe actual Proxy library contract contains a couple of \u003ccode\u003estorage_var\u003c/code\u003e as seen below:\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-javascript\" data-lang=\"javascript\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#960050;background-color:#1e0010\"\u003e@\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003estorage_var\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003efunc\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eProxy_implementation_hash\u003c/span\u003e() \u003cspan style=\"color:#f92672\"\u003e-\u0026gt;\u003c/span\u003e (\u003cspan style=\"color:#a6e22e\"\u003eclass_hash\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e)\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003eend\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#960050;background-color:#1e0010\"\u003e@\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003estorage_var\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003efunc\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eProxy_admin\u003c/span\u003e() \u003cspan style=\"color:#f92672\"\u003e-\u0026gt;\u003c/span\u003e (\u003cspan style=\"color:#a6e22e\"\u003eproxy_admin\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e)\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003eend\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#960050;background-color:#1e0010\"\u003e@\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003estorage_var\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003efunc\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eProxy_initialized\u003c/span\u003e() \u003cspan style=\"color:#f92672\"\u003e-\u0026gt;\u003c/span\u003e (\u003cspan style=\"color:#a6e22e\"\u003einitialized\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e)\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003eend\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003eWhat would happen if someone was able to initialize your implementation contract before you?\u003c/p\u003e\n\u003cp\u003eMost of the times, developers would realize that and simply re-deploy and initialize again, however that might end up costing more gas than expected. If the developers do not realize that their contract was initialized by another party, this could be very problematic. For instance, this could happen if the initialization function is not throwing an error and silently return even if already initialized. An attacker that was able to initialize certain contracts, would likely be set as the admin of the contract and perform various attacks based on the contract\u0026rsquo;s functionalities.\u003c/p\u003e\n\u003cp\u003eTo counter this, always use the \u003ccode\u003einitializable\u003c/code\u003e \u003ca href=\"https://github.com/OpenZeppelin/cairo-contracts/blob/main/src/openzeppelin/security/initializable/library.cairo\"\u003elibrary\u003c/a\u003e for contracts that have init functions, as well as make sure that your deployment includes initialization.\u003c/p\u003e\n\u003cp\u003eOn top of OpenZeppelin\u0026rsquo;s documentation linked above, a detailed guide on how to use the Proxy pattern is provided by Empiric Network \u003ca href=\"https://medium.com/@EmpiricNetwork/starknet-guide-writing-upgradable-contracts-using-a-proxy-af3f107f238b\"\u003ehere\u003c/a\u003e.\u003c/p\u003e\n\u003ch3 id=\"deploying-your-implementation-contract\"\u003eDeploying your implementation contract\u003c/h3\u003e\n\u003cp\u003eReading off StarkNet\u0026rsquo;s official documentation:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eUnlike Ethereum, StarkNet distinguishes between a contract class and a contract instance. A contract class represents the code of a contract (but with no state), while a contract instance represents a specific instance of the class, with its own state.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eOne mistake that StarkNet\u0026rsquo;s developer can make, is to actually deploy the implementation contract, not just the proxy (we can see an example on this year \u003ca href=\"https://github.com/amanusk/cairo-paradigm-ctf/blob/main/paradigm-ctf-infrastructure/images/cairo-challenge-base/cairo_sandbox/proxy-chal.py\"\u003eParadigm CTF\u003c/a\u003e). The implementation is supposed to be declared as a contract class, and the hash passed to the Proxy constructor so that it knows where to delegate its calls.\u003c/p\u003e\n\u003cp\u003eThe whole purpose of using a proxy pattern, thus using the storage of the Proxy and functionality of the implementation would not be fulfilled in this case, as someone would just be able to directly interact with the implementation contract, which would have its own state.\u003c/p\u003e\n\u003cp\u003eTo recap, always make sure that your implementation contracts are declared first, and then only the Proxy(s) are deployed. Finally, initialize the implementation contract via the Proxy. Some more details on how contract classes work is described on Starknet\u0026rsquo;s \u003ca href=\"https://docs.starknet.io/documentation/architecture_and_concepts/Contracts/contract-classes/\"\u003edocumentation\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eYou can declare a contract class in different ways with either \u003ccode\u003enile\u003c/code\u003e or directly with the \u003ccode\u003estarket-cli\u003c/code\u003e (plus using all other tools available or SDKs):\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003estarknet declare --contract contract_compiled.json\u003c/code\u003e\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003enile declare contract_name\u003c/code\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eThe output would look something like this:\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-bash\" data-lang=\"bash\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003eDeclare transaction was sent.\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003eContract class hash: 0x1e2208b571b2cb68908f37a196ed5e391c8933a6db23bb3939acedee40d9b8a\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003eTransaction hash: 0x762e166dd3326b2e263eb5bcfdccd225dc88e067fdf7c92cf8ce5e4ea01f9f1\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003eAs stated above, the contract class hash should then be passed to the Proxy constructor as follow:\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-bash\" data-lang=\"bash\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003enile deploy proxy 0x1e2208b571b2cb68908f37a196ed5e391c8933a6db23bb3939acedee40d9b8a --alias my_proxy\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003ch2 id=\"oracles\"\u003eOracles\u003c/h2\u003e\n\u003cp\u003eOracles are the go to solution for accessing off-chain data on-chain. These are used for receiving price feeds, or other data needed in a smart contract like a random number.\u003c/p\u003e\n\u003ch3 id=\"price-feeds\"\u003ePrice Feeds\u003c/h3\u003e\n\u003cp\u003eIn StarkNet we have two working price feed oracles (apologies if we missed any):\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"https://empiric.network/\"\u003eEmpiric Network\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"https://www.stork.network/\"\u003eStork\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eAlways use price feeds from reputable sources when you need to fetch token prices on chain. Let\u0026rsquo;s take as an example a protocol that makes use of stablecoins. We have seen in the past that stablecoins sometimes are not that stable, and it happens sometimes that protocols just assume that their price will always be one dollar (yes this really happens).\u003c/p\u003e\n\u003cp\u003eImagine if this one stablecoin now depegs, and people are able to get discounted loans on a lending protocol because they can buy that token for half price, while the protocol always counts it as 1$. Well, our friendly devs above, made a pretty easy to use solution for us, so make good use of it.\u003c/p\u003e\n\u003cp\u003eFor Empiric Network, you can use the following \u003ca href=\"https://docs.empiric.network/quickstart\"\u003eguide\u003c/a\u003e, and \u003ca href=\"https://docs.stork.network/quick-start\"\u003ethis one\u003c/a\u003e for Stork.\u003c/p\u003e\n\u003cp\u003eAll it really takes is just a couple of lines as shown below (plus of course a couple of other variables you want to use to store the feeds keys):\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-javascript\" data-lang=\"javascript\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#960050;background-color:#1e0010\"\u003e@\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003eview\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003efunc\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003emy_func\u003c/span\u003e{\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003esyscall_ptr\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e*\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003epedersen_ptr\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eHashBuiltin\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e*\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003erange_check_ptr\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e}() \u003cspan style=\"color:#f92672\"\u003e-\u0026gt;\u003c/span\u003e ()\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#66d9ef\"\u003elet\u003c/span\u003e (\u003cspan style=\"color:#a6e22e\"\u003eeth_price\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003edecimals\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003elast_updated_timestamp\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        \u003cspan style=\"color:#a6e22e\"\u003enum_sources_aggregated\u003c/span\u003e) \u003cspan style=\"color:#f92672\"\u003e=\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eIEmpiricOracle\u003c/span\u003e.\u003cspan style=\"color:#a6e22e\"\u003eget_value\u003c/span\u003e(\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e            \u003cspan style=\"color:#a6e22e\"\u003eEMPIRIC_ORACLE_ADDRESS\u003c/span\u003e, \u003cspan style=\"color:#a6e22e\"\u003eKEY\u003c/span\u003e, \u003cspan style=\"color:#a6e22e\"\u003eAGGREGATION_MODE\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e        )\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#960050;background-color:#1e0010\"\u003e#\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003eYour\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003esmart\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003econtract\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003elogic\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e!\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#66d9ef\"\u003ereturn\u003c/span\u003e ()\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003eend\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003ePlease note the risk of trusting a third-party, so make your due diligence before choosing which option to implement in your contract.\u003c/p\u003e\n\u003ch3 id=\"pseudo-random-number-generators\"\u003ePseudo Random Number Generators\u003c/h3\u003e\n\u003cp\u003eWhenever you need to generate random values in your code, please refrain from using methods like using the block number, or using contract addresses, etc.. In Solidity, we have it easy with ChainLink, just pay the fee, and get all the needed verifiable random numbers in your contract.\u003c/p\u003e\n\u003cp\u003eWith StarkNet, solutions are being built as we speak:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eEmpiric Network is working on their implementation\u003c/li\u003e\n\u003cli\u003e0xNonCents just deployed a \u003ca href=\"https://twitter.com/0xNonCents/status/1555288515314946049\"\u003eVRF\u003c/a\u003e in the Testnet\u003c/li\u003e\n\u003cli\u003eSomeone else? Maybe ChainLink or a bridge for VRF from mainnet to StarkNet? (a bridge might be very expensive compared to a native solution though)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eImagine someone was using a contract address modulo some number as a source of randomness, this could go really bad.\u003c/p\u003e\n\u003cp\u003eA contract address will be the result of the formula below (please refer to the \u003ca href=\"https://docs.starknet.io/documentation/architecture_and_concepts/Contracts/contract-address/\"\u003etechnical documentation\u003c/a\u003e for more details):\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-golang\" data-lang=\"golang\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003econtract_address\u003c/span\u003e \u003cspan style=\"color:#f92672\"\u003e:=\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003epedersen\u003c/span\u003e(\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#960050;background-color:#1e0010\"\u003e“\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003eSTARKNET_CONTRACT_ADDRESS\u003c/span\u003e\u003cspan style=\"color:#960050;background-color:#1e0010\"\u003e”\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003ecaller_address\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003esalt\u003c/span\u003e,\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003epedersen\u003c/span\u003e(\u003cspan style=\"color:#a6e22e\"\u003econtract_code\u003c/span\u003e),\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e    \u003cspan style=\"color:#a6e22e\"\u003epedersen\u003c/span\u003e(\u003cspan style=\"color:#a6e22e\"\u003econstructor_calldata\u003c/span\u003e))\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003eWith the right amount of time, an attacker might be able to deploy a contract with an arbitrary address that would result in the \u0026ldquo;randomness\u0026rdquo; being bypassed, so make sure you stick to using a VRF.\u003c/p\u003e\n\u003cp\u003eAs with the Price Feeds section above, exercise caution when using third-party code, make sure this is open source and can be verified, as requesting a random number from a Oracle would usually result in their contract making a call to your contract. Always check that the VRF callback function is protected from reentrancy (should it implement further logic than just storing the number) and that it can only be called from the Oracle contract address.\u003c/p\u003e\n\u003ch2 id=\"logic-flaws\"\u003eLogic Flaws\u003c/h2\u003e\n\u003cp\u003eAs with any system, developers implementing business logic may make  mistakes which could result in loss of funds. We believe it is difficult to generalize these type of bugs, and it is up to the auditor and their past experience to find them. Often, these bugs encompass portions of all other bugs that have and will be described in this post.\u003c/p\u003e\n\u003cp\u003eThis is why performing extensive auditing is essential to the development of contracts on any platform.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eWe will update this section as more audits are conducted and examples are made public.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 id=\"frontrunning\"\u003eFrontrunning\u003c/h2\u003e\n\u003cp\u003eIs frontrunning a thing in StarkNet? Well, AFAIK there is no public mempool (yet?).. But I would still exercise caution. Also, things might change with the introduction of decentralized sequencers, some people talk about sequencer extractable value.\u003c/p\u003e\n\u003cp\u003eFor instance, let\u0026rsquo;s imagine the example below.\u003c/p\u003e\n\u003cp\u003eWe have a marketplace which allows people to sell tickets for a football game (in an imaginary world where event tickets are NFTs). Sellers will create a sell offer and lock their ticket in the contract. Now, the protocol\u0026rsquo;s code will have the following \u003ccode\u003esellTicket\u003c/code\u003e function:\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-javascript\" data-lang=\"javascript\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003esellTicket\u003c/span\u003e(\u003cspan style=\"color:#a6e22e\"\u003eticketId\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e, \u003cspan style=\"color:#a6e22e\"\u003eprice\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e)\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003eThis function above will store the ticket in a storage variable such as the following:\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-javascript\" data-lang=\"javascript\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#960050;background-color:#1e0010\"\u003e@\u003c/span\u003e\u003cspan style=\"color:#a6e22e\"\u003estorage_var\u003c/span\u003e\n\u003c/span\u003e\u003c/span\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003efunc\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003etickets_on_sale\u003c/span\u003e(\u003cspan style=\"color:#a6e22e\"\u003eticketId\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e) \u003cspan style=\"color:#f92672\"\u003e-\u0026gt;\u003c/span\u003e (\u003cspan style=\"color:#a6e22e\"\u003eprice\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e)\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003eThe buyer, can buy one of these tickets using a nice frontend or directly calling the contract, and the function call would be something like this:\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-javascript\" data-lang=\"javascript\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003ebuyTicket\u003c/span\u003e(\u003cspan style=\"color:#a6e22e\"\u003eticketId\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e)\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003eNow, what would happen if before this legitimate \u003ccode\u003ebuy\u003c/code\u003e transaction goes through, someone else has their transaction validated first and buys the ticket, then puts it on sale again for a higher price (which should be less or equal to the allowance that was given to the contract from the legitimate buyer). The attacker would have made a very quick profit on this, and the buyer would find themselves with less funds than expected. This of course assumes that the legitimate buyer set an allowance great enough for the attack to be profitable.\u003c/p\u003e\n\u003cp\u003eWhile this is a simple example and way more complex frontrunning attacks can be found all around Solidity smart contracts, the solution is also simple. Add the price of the ticket in the \u003ccode\u003ebuy\u003c/code\u003e function (and if the contract allows sales with multiple currencies, also the currency):\u003c/p\u003e\n\u003cdiv class=\"highlight\"\u003e\u003cpre tabindex=\"0\" style=\"color:#f8f8f2;background-color:#272822;-moz-tab-size:4;-o-tab-size:4;tab-size:4;-webkit-text-size-adjust:none;\"\u003e\u003ccode class=\"language-javascript\" data-lang=\"javascript\"\u003e\u003cspan style=\"display:flex;\"\u003e\u003cspan\u003e\u003cspan style=\"color:#a6e22e\"\u003ebuyTicket\u003c/span\u003e(\u003cspan style=\"color:#a6e22e\"\u003eticketId\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e, \u003cspan style=\"color:#a6e22e\"\u003eprice\u003c/span\u003e\u003cspan style=\"color:#f92672\"\u003e:\u003c/span\u003e \u003cspan style=\"color:#a6e22e\"\u003efelt\u003c/span\u003e)\n\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\u003cp\u003eThe function should validate that the price stored in the contract matches the price passed as parameter (which the caller, or the frontend system, should have gotten before initiating the transaction).\u003c/p\u003e\n\u003cp\u003eThese types of attacks are very common in this world, especially in AMMs, where MEV bots would sandwich transactions in low liquidity pools, should they see they can make a good profit (and would most often than not this would include a flashloan).\u003c/p\u003e\n\u003ch2 id=\"governance-attacks\"\u003eGovernance Attacks\u003c/h2\u003e\n\u003cp\u003eWith Solidity, we have seen many governance attacks being carried out. For instance, protocols counting voting power based on the balance of the caller on the time of calling a function (flashloans anyone?), or not enforcing a timelock on a proposal, and allowing malicious users from self-approving and executing the proposal straight away.\u003c/p\u003e\n\u003cp\u003eWill the same mistakes be made in StarkNet\u0026rsquo;s protocols too?\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eThis section will be updated as the authors find the time to implement some example scenarios, or others are made public.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 id=\"denial-of-service-dos\"\u003eDenial of Service (DoS)\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003eThis is an area which needs more research, and will be updated soon.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eOutside of StarkNet, we observed denial of service scenarios in a number of cases:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eContracts using external paid services like ChainLink\u0026rsquo;s VRF and allowing anyone to instantiate a request (thus making the contract pay \u003ccode\u003e$LINK\u003c/code\u003e tokens)\u003c/li\u003e\n\u003cli\u003eUsers blocking refunds by \u003ccode\u003ereverting\u003c/code\u003e in a smart contract\u0026rsquo;s fallback function (observed in NFT mint contracts which include refunding gas to all minters in a for loop)\u003c/li\u003e\n\u003cli\u003eReaching block gas limit by large loops making external calls\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eIt will be interesting seeing what opportunities for DoS are encountered in StarkNet (and hopefully caught first by an audit).\u003c/p\u003e\n\u003cp\u003eTo conclude (for now), we should consider that at this stage of StarkNet\u0026rsquo;s life, transactions can be censored. As of the time of writing this first iteration of this post, the sequencer is centralized. Therefore, it might be possible that transactions are censored and this can cause huge damage. We have seen this described by ChainSecurity in their MakerDAO DAI bridge \u003ca href=\"https://chainsecurity.com/wp-content/uploads/2021/12/ChainSecurity_MakerDAO_StarkNet-DAI-Bridge_audit.pdf\"\u003ereport\u003c/a\u003e. Things will of course change as decentralized sequencers are introduced in StarkNet.\u003c/p\u003e\n\u003ch2 id=\"not-using-static-code-analyzers\"\u003eNot using Static Code Analyzers\u003c/h2\u003e\n\u003cp\u003eWhile static code analysis should not be considered as a replacement of a security audit, they can help find low-hanging fruits in your Cairo code (or any other code), so why not use them?\u003c/p\u003e\n\u003cp\u003eTrail of Bits developed \u003ca href=\"https://github.com/crytic/amarna\"\u003eAmarna\u003c/a\u003e. For more information please refer to their GitHub and to their blog post \u003ca href=\"https://blog.trailofbits.com/2022/04/20/amarna-static-analysis-for-cairo-programs/\"\u003ehere\u003c/a\u003e. For instance, \u003cem\u003e\u003cstrong\u003eAmarna\u003c/strong\u003e\u003c/em\u003e will detect some of the issues being described here, such as \u003ccode\u003eview\u003c/code\u003e functions modifying state, or \u003ccode\u003estorage_var\u003c/code\u003e name clashing.\u003c/p\u003e\n\u003cp\u003eOur kind \u003ca href=\"https://github.com/franalgaba\"\u003e@franalgaba\u003c/a\u003e and \u003ca href=\"https://github.com/milancermak\"\u003e@milancermak\u003c/a\u003e have written \u003ca href=\"https://github.com/franalgaba/pre-commit-cairo\"\u003ethis\u003c/a\u003e Cairo pre-commit hook that can run your code through some checks while committing the code.\u003c/p\u003e\n\u003ch2 id=\"how-do-you-prepare-for-an-audit\"\u003eHow do you prepare for an audit?\u003c/h2\u003e\n\u003cp\u003eEvery respectable project that wants to launch, should undergo a security audit before going live. This is important, as even if your devs are the \u0026ldquo;best\u0026rdquo;, humans make mistakes.\u003c/p\u003e\n\u003cp\u003eAs a rule of thumb, and if funding allow it, you should aim  to have two companies audit your project, so that if someone misses something, there is a very good chance the other auditor/s find it. Also, running a bug bounty program on a platform such as \u003ca href=\"https://immunefi.com/\"\u003eImmunefi\u003c/a\u003e is a good way to incentivize white hat hackers to look at your code and help you. Finally, \u003ca href=\"https://code4rena.com/\"\u003eCode4rena\u003c/a\u003e is a great way to have some of the best minds in blockchain security try to break your code.\u003c/p\u003e\n\u003cp\u003eGoing back to answering the question of how to prepare for an audit, we recommend to follow this checklist:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003cinput disabled=\"\" type=\"checkbox\"\u003e Make sure that the code is well commented\u003c/li\u003e\n\u003cli\u003e\u003cinput disabled=\"\" type=\"checkbox\"\u003e Make sure that appropriate documentation is produced (more often than not, writing up documentation will lead you to find some bugs yourself)\u003c/li\u003e\n\u003cli\u003e\u003cinput disabled=\"\" type=\"checkbox\"\u003e Implement thorough test cases (Auditors really appreciate that)\u003c/li\u003e\n\u003cli\u003e\u003cinput disabled=\"\" type=\"checkbox\"\u003e Research audit companies and choose one which fits your budget and which you would feel safe with\u003c/li\u003e\n\u003cli\u003e\u003cinput disabled=\"\" type=\"checkbox\"\u003e Identify areas of concern which you believe that might have bugs (This gives the auditor a good starting point)\u003c/li\u003e\n\u003cli\u003e\u003cinput disabled=\"\" type=\"checkbox\"\u003e Gather documentation and updated deployment scripts to allow auditors to hit the ground running\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"testing-tools\"\u003eTesting Tools\u003c/h2\u003e\n\u003cp\u003eWhich frameworks can you use to test Cairo contracts?\u003c/p\u003e\n\u003cp\u003eWell, luckily you have many options (all links are in the section below):\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ccode\u003eProtostar\u003c/code\u003e - if you want to benefit from Rust\u0026rsquo;s speed and write your tests directly in Cairo\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eNile\u003c/code\u003e - if you like Python and want to perform quick tests via the CLI or build more complex tests using their plugin system\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003ePytest\u003c/code\u003e and StarkNet testing class (refer to cairo-contracts test suites to see how to use it)\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eStarknet-devnet\u003c/code\u003e to launch a local environment where you can perform local testing (works in tandem with nile and/or the starknet CLI)\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eStarkNet\u003c/code\u003e plugin for HardHat - a plugin to use StarkNet with HardHat for developing and testing smart contracts\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eApe Worx\u003c/code\u003e - a Brownie like framework that can be used to develop and test smart contracts on different chains. Written in Python\u003c/li\u003e\n\u003cli\u003e\u003ccode\u003eStarknet-py\u003c/code\u003e - a Python library for developing and testing StarkNet smart contracts\u003c/li\u003e\n\u003c/ul\u003e\n\u003cblockquote\u003e\n\u003cp\u003ePlease let us know what we missed, and they will be added.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch2 id=\"references\"\u003eReferences\u003c/h2\u003e\n\u003cp\u003eHere are all of the links that have been used in this research (plus some extra), and that have been mentioned. Thanks to everyone for their great content, and for making StarkNet awesome.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eStarkWare - \u003ca href=\"https://eprint.iacr.org/2021/1063\"\u003eCairo whitepaper\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003eStarkWare - \u003ca href=\"https://docs.starknet.io/\"\u003eStarkNet Docs\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003eStarkWare - \u003ca href=\"https://starknet.io/docs/how_cairo_works/index.html\"\u003eHow Cairo Works\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003eStarkWare - \u003ca href=\"https://starknet.io/docs/hello_starknet/index.html\"\u003eHello StarkNet\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003eOpenZeppelin - \u003ca href=\"https://github.com/OpenZeppelin/cairo-contracts\"\u003eCairo contracts\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003eChainSecurity - \u003ca href=\"https://chainsecurity.com/wp-content/uploads/2021/12/ChainSecurity_MakerDAO_StarkNet-DAI-Bridge_audit.pdf\"\u003eMakerDAO StarkNet bridge audit\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003eCairoPractice - \u003ca href=\"https://mirror.xyz/0xa37228277Ed21843c5F61F4Ed2928Af5Df2A81C9/GJHHUYJDfN-0Ok8yO7jsjAJaxBefWGcyVhNwpE_IJJw\"\u003eCairo conventions\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003eCoinMonks - \u003ca href=\"https://medium.com/coinmonks/storage-variable-clashing-in-starknet-ce5f28e60886\"\u003eVariable name clashing\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003eApe Worx - \u003ca href=\"https://github.com/ApeWorX/ape-starknet\"\u003eStarkNet plugin\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003eOnlyDust - \u003ca href=\"https://github.com/onlydustxyz/development-guidelines/blob/main/starknet/README.md\"\u003edevelopment guidelines\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003eEmpiric Network - \u003ca href=\"https://empiric.network/\"\u003eprice feeds\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003eStork Oracle - \u003ca href=\"https://www.stork.network/\"\u003eprice feeds\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003eStarkNet-py - \u003ca href=\"https://github.com/software-mansion/starknet.py\"\u003erepo\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003eOpenZeppelin - \u003ca href=\"https://github.com/OpenZeppelin/nile\"\u003eNile\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003eShard Labs - \u003ca href=\"https://github.com/Shard-Labs/starknet-devnet\"\u003eStarkNet Devnet\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003eStarkWare - \u003ca href=\"https://github.com/starkware-libs/cairo-lang/tree/master/src/starkware\"\u003eCairo standard library\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003eInfluenceEth - \u003ca href=\"https://github.com/influenceth/cairo-math-64x61/\"\u003eMath64x61\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003eBeautyisourbusiness - \u003ca href=\"https://github.com/beautyisourbusiness/cairo-goldmine\"\u003eCairo Goldmine\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003eShardLabs - HardHat StarkNet plugin \u003ca href=\"https://github.com/Shard-Labs/starknet-hardhat-plugin\"\u003erepo\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003eOnlyDust - \u003ca href=\"https://github.com/onlydustxyz/starklings\"\u003eStarklings\u003c/a\u003e (if you want to learn Cairo in a fun and interactive way)\u003c/li\u003e\n\u003cli\u003e0xNonCents - \u003ca href=\"https://twitter.com/0xNonCents/status/1555288515314946049\"\u003eVRF\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003eHackernoon - \u003ca href=\"https://hackernoon.com/what-is-cairo-lang-10-best-resources-for-scaling-dapps-using-starks\"\u003earticle\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003eEmpiric Network - \u003ca href=\"https://medium.com/@EmpiricNetwork/starknet-guide-writing-upgradable-contracts-using-a-proxy-af3f107f238b\"\u003ewriting upgradable contracts\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003eOpenZeppelin - \u003ca href=\"https://docs.openzeppelin.com/contracts-cairo/0.3.1/extensibility\"\u003eextensibility patter\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003eAmanusk Paradigm CTF \u003ca href=\"https://github.com/amanusk/cairo-paradigm-ctf\"\u003ecairo solutions\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003eCrytic (ToB) - \u003ca href=\"https://github.com/crytic/building-secure-contracts/tree/master/not-so-smart-contracts/cairo\"\u003enot so smart cairo contracts\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003eFravoll - \u003ca href=\"https://fravoll.github.io/solidity-patterns/checks_effects_interactions.html\"\u003eChecks-effects-interaction pattern\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003eCoinDesk - \u003ca href=\"https://www.coindesk.com/tech/2022/03/31/ola-finance-exploited-for-36m-in-re-entrancy-attack/\"\u003ere-entrancy attacks\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003eCoinMarketCap - \u003ca href=\"https://coinmarketcap.com/alexandria/article/a-history-of-the-dao-hack\"\u003eDAO hack\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003eJordan McKinney - \u003ca href=\"https://www.youtube.com/watch?v=jcrAq71WwSM\"\u003ethe Felt integer type explained\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch2 id=\"ps\"\u003eP.S.\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003eThis guide will be maintained and examples and new sections added as more research is conducted. We also encourage other devs and auditors to contribute to it and give feedback.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003e\u003ca href=\"https://github.com/ctrlc03/ctrlc03.github.io\"\u003eRepository link\u003c/a\u003e\u003c/p\u003e\n","cat":"POST","date":"2023.04.28","read":"45 MIN","slug":"cairo-security","summary":"StarkNet is a decentralized ZK rollup which operates as a Layer 2 (L2) for Ethereum. Let's talk security","title":"Cairo 0.x Security"}],
      cv:       [{"entries":[{"body":"Implement and integrate FHE, ZK, and MPC primitives into the Rust node software powering the Interfold network. Architect cross-layer connections spanning Noir ZK circuits, Solidity smart contracts, and Rust. Built demo applications including CRISP (coercion-resistant voting) and sealed-bid auctions for DeFi. Author technical content for engineering and research audiences.","title":"Senior Engineer","when":"Aug 2025 — present","where":"Gnosis Guild — The Interfold (formerly Enclave)"},{"body":"Led MACI as primary technical owner — set roadmap and release priorities for a team of 5 engineers while continuing to ship production TypeScript, Solidity, and Circom code. Scope expanded in April 2025 to also lead Semaphore and zk-kit. Owned code review, mentorship, and onboarding; coordinated with external auditors, grantees, and adjacent maintainers. Represented the projects externally — 5 conference talks, 10 blog posts, recruiting, community updates.","title":"Team Lead — MACI, Semaphore \u0026 zk-kit","when":"Apr 2024 — Aug 2025","where":"Ethereum Foundation · PSE (Privacy \u0026 Scaling Explorations)"},{"body":"Developed and maintained MACI, p0tion, DefinitelySetup, Semaphore, zk-kit, and Excubiae. Managed production infrastructure for p0tion and DefinitelySetup — Terraform IaC, Firebase/GCP, AWS, CI/CD pipelines automating zk trusted-setup ceremonies. Researched anti-collusion detection for private voting and quadratic funding. Reviewed internal Solidity, TypeScript, and Circom code for security vulnerabilities. Helped run QF rounds at conferences and presented ZK material to attendees and summer-programme students.","title":"Software Engineer","when":"Jul 2022 — Apr 2024","where":"Ethereum Foundation · PSE"},{"body":"Conducted Solidity audits of client protocols and penetration tests against web3 applications. Delivered client-facing audit reports and findings walkthroughs. Led the effort to expand the practice into ZK protocol a
